<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell, ComposedChart, AreaChart, Area, Radar, RadarChart, PolarGrid, PolarAngleAxis, Legend } = window.Recharts;

// --- 1. Icon Component ---
const Icon = ({ name, size = 16, className = "" }) => {
    const faMap = {
        Upload: 'fa-upload', FileText: 'fa-file-lines', BarChart3: 'fa-chart-column',
        TrendingUp: 'fa-arrow-trend-up', TrendingDown: 'fa-arrow-trend-down',
        Loader2: 'fa-circle-notch fa-spin', Printer: 'fa-print', Database: 'fa-database',
        CheckCircle2: 'fa-circle-check', FileSpreadsheet: 'fa-file-excel',
        PieChartIcon: 'fa-chart-pie', DollarSign: 'fa-dollar-sign', ArrowUpRight: 'fa-arrow-up', ArrowDownRight: 'fa-arrow-down',
        Layers: 'fa-layer-group', LineMsg: 'fa-line', PaperPlane: 'fa-paper-plane', ScaleBalanced: 'fa-scale-balanced',
        AlertCircle: 'fa-circle-exclamation', ListCheck: 'fa-list-check', Pen: 'fa-pen', Check: 'fa-check',
        Xmark: 'fa-xmark', Trash: 'fa-trash', Target: 'fa-bullseye'
    };
    const isBrand = name === 'LineMsg' ? 'fa-brands' : 'fa-solid';
    return <i className={`${isBrand} ${faMap[name] || 'fa-circle'} ${className}`} style={{ fontSize: size }}></i>;
};

// --- 2. Global Utils ---
const MONTHS_SHORT = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
const COLORS = ['#1e3a8a', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'];

const formatCurrency = (val) => {
    if (!val || isNaN(val)) return '-';
    if (Math.abs(val) < 0.01) return '-';
    const formatted = Math.abs(val).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return val < 0 ? `(${formatted})` : formatted;
};

const formatCompact = (val) => {
    if (!val || isNaN(val)) return '0';
    if (Math.abs(val) >= 1000000) return `฿ ${(val / 1000000).toFixed(2)}M`;
    if (Math.abs(val) >= 1000) return `฿ ${(val / 1000).toFixed(0)}k`;
    return `฿ ${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

const parseDateToYearMonth = (dateVal) => {
    if (!dateVal) return { year: -1, month: -1 };
    if (typeof dateVal === 'number') {
        const date = new Date((dateVal - (25567 + 1)) * 86400 * 1000);
        return { year: date.getFullYear(), month: date.getMonth() };
    }
    const strDate = dateVal.toString().trim();
    if (strDate.includes('/')) {
        const parts = strDate.split('/');
        if (parts[0].length === 4) return { year: parseInt(parts[0], 10), month: parseInt(parts[1], 10) - 1 };
        return { year: parseInt(parts[2], 10), month: parseInt(parts[1], 10) - 1 };
    } else if (strDate.includes('-')) {
        const parts = strDate.split('-');
        if (parts[0].length === 4) return { year: parseInt(parts[0], 10), month: parseInt(parts[1], 10) - 1 };
        return { year: parseInt(parts[2], 10), month: parseInt(parts[1], 10) - 1 };
    }
    return { year: -1, month: -1 };
};

const cleanNumber = (val) => {
    if (!val) return 0;
    if (typeof val === 'number') return val;
    return parseFloat(val.toString().replace(/,/g, '')) || 0;
};

// --- 3. Accounting Engine ---
const useFinancialEngine = (csvDataRows, selectedYear) => {
    const [availableYears, setAvailableYears] = useState([]);
    const [parsedTx, setParsedTx] = useState([]);
    const [financialData, setFinancialData] = useState({
        revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: []
    });

    useEffect(() => {
        if (!csvDataRows || csvDataRows.length === 0) return;
        const isExpress = csvDataRows.slice(0, 15).some(r => r[0] && String(r[0]).replace(/\s/g, '').includes('รายงานแยกประเภท'));
        const closingKeywords = ["ปิดบัญชี", "ยอดยกไป", "closing", "โอนปิด", "โอนกำไร", "ปิดยอด", "year end", "ปิดงบ", "โอนบัญชี"];
        
        let headerRowIdx = -1;
        let colMap = {};
        for(let i=0; i<Math.min(20, csvDataRows.length); i++) {
            const row = csvDataRows[i];
            if(!row) continue;
            const rowStr = row.map(c => String(c||'').toLowerCase()).join('|');
            if((rowStr.includes('รหัสบัญชี') || rowStr.includes('account code')) && (rowStr.includes('เดบิต') || rowStr.includes('debit'))) {
                headerRowIdx = i;
                row.forEach((col, idx) => {
                    const c = String(col||'').toLowerCase();
                    if(c.includes('รหัสบัญชี') || c.includes('account code')) colMap.code = idx;
                    else if(c.includes('ชื่อบัญชี') || c.includes('account name')) colMap.name = idx;
                    else if(c === 'วันที่' || c === 'date') colMap.date = idx;
                    else if(c === 'เดบิต' || c === 'debit' || c.includes('debit')) colMap.debit = idx;
                    else if(c === 'เครดิต' || c === 'credit' || c.includes('credit')) colMap.credit = idx;
                });
                break;
            }
        }
        
        let flatTransactions = [];
        let yearsSet = new Set();
        const generateId = () => Math.random().toString(36).substr(2, 9);

        if (isExpress) {
            let curCode = ""; let curName = ""; let seenAccounts = new Set(); 
            csvDataRows.forEach(row => {
                if (!row || !row[0]) return;
                const col0 = String(row[0]).trim();
                if (col0.includes('บริษัท') || col0.includes('รายงาน') || col0.includes('วันที่จาก') || col0.includes('เลขที่บัญชี') || col0.includes('พิมพ์โดย') || col0 === 'วันที่' || col0 === 'รวม') return; 

                if (/^[a-zA-Z0-9-\.]{4,}$/.test(col0) && !col0.includes('/') && !col0.match(/[ก-๙]/)) {
                    curCode = col0; curName = String(row[2] || "").trim();
                    if (!seenAccounts.has(curCode)) {
                        seenAccounts.add(curCode);
                        let openBal = parseFloat(String(row[8] || "").replace(/,/g, ''));
                        if (isNaN(openBal) && row.length > 0) openBal = parseFloat(String(row[row.length - 1] || "").replace(/,/g, ''));
                        if (!isNaN(openBal) && openBal !== 0) {
                            flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: openBal>0?openBal:0, rawCredit: openBal<0?Math.abs(openBal):0 });
                        }
                    }
                } else if (col0.includes('/') && col0.split('/').length >= 3) {
                    const desc = String(row[3] || "").trim();
                    if (desc.includes('ยอดยกมา') || closingKeywords.some(kw => desc.toLowerCase().includes(kw))) return; 
                    const { year, month } = parseDateToYearMonth(col0);
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: col0, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: cleanNumber(row[5]), rawCredit: cleanNumber(row[6]) });
                }
            });
        } else if (headerRowIdx !== -1 && colMap.code !== undefined && colMap.debit !== undefined) {
            let seenAccountsSmart = new Set();
            for(let i = headerRowIdx + 1; i < csvDataRows.length; i++) {
                const row = csvDataRows[i];
                if (!row || row.length === 0) continue;
                let curCode = String(row[colMap.code] || "").trim();
                if (!curCode) continue;

                let curName = colMap.name !== undefined ? String(row[colMap.name] || "").trim() : "";
                let dateStr = colMap.date !== undefined ? String(row[colMap.date] || "").trim() : "";
                let desc = String(row[5] || "").trim(); 
                let debit = cleanNumber(row[colMap.debit]);
                let credit = cleanNumber(row[colMap.credit]);

                const rowString = row.join("|");
                if (closingKeywords.some(kw => rowString.toLowerCase().includes(kw))) continue; 

                if (rowString.includes("ยอดยกมา") || (!dateStr && rowString.includes("ยอดยกมา"))) {
                    if (!seenAccountsSmart.has(curCode)) {
                        seenAccountsSmart.add(curCode);
                        flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: desc || 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: debit, rawCredit: credit });
                    }
                } else if (dateStr && dateStr.includes('/')) {
                    const { year, month } = parseDateToYearMonth(dateStr);
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: dateStr, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: debit, rawCredit: credit });
                }
            }
        } else {
            let curCode = ""; let curName = ""; let seenAccountsStandard = new Set();
            csvDataRows.forEach(row => {
                if (!row || row.length === 0) return;
                const col0 = (row[0] || "").toString().trim();
                const accountMatch = col0.match(/^(\d+)\s*\((.*)\)/);
                if (accountMatch) { curCode = accountMatch[1]; curName = accountMatch[2]; }
                if (!curCode) return;
                
                const rowString = row.join("|");
                const desc = String(row[5] || "").trim();
                if (closingKeywords.some(kw => rowString.toLowerCase().includes(kw)) || rowString.includes("ลำดับที่")) return;

                const debit = cleanNumber(row[6]);
                const credit = cleanNumber(row[7]);

                if (rowString.includes("ยอดยกมา")) {
                    if (!seenAccountsStandard.has(curCode)) {
                        seenAccountsStandard.add(curCode);
                        flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: desc || 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: debit, rawCredit: credit });
                    }
                } else {
                    const dateStr = String(row[2]||"").trim();
                    if (!dateStr || !dateStr.includes('/')) return; 
                    const { year, month } = parseDateToYearMonth(dateStr);
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: dateStr, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: debit, rawCredit: credit });
                }
            });
        }

        setParsedTx(flatTransactions);
        setAvailableYears(Array.from(yearsSet).sort((a,b)=>b-a));
    }, [csvDataRows]);

    useEffect(() => {
        if (!parsedTx || parsedTx.length === 0) return;
        const targetYear = selectedYear || (availableYears.length > 0 ? availableYears[0] : new Date().getFullYear());
        const accountMap = {};
        
        parsedTx.forEach(tx => {
            const code = String(tx.code || '').trim();
            if (!code) return;
            if (!accountMap[code]) accountMap[code] = { id: code, name: tx.name, openingBalance: 0, monthlyChange: Array(12).fill(0) };
            
            let isDebitNature = code.startsWith('1') || code.startsWith('5');
            let debit = parseFloat(tx.rawDebit) || 0;
            let credit = parseFloat(tx.rawCredit) || 0;
            let netAmt = isDebitNature ? (debit - credit) : (credit - debit);

            if (tx.isOpening) {
                accountMap[code].openingBalance += netAmt;
            } else {
                const isBS = code.startsWith('1') || code.startsWith('2') || code.startsWith('3');
                if (tx.year < targetYear && isBS) {
                    accountMap[code].openingBalance += netAmt;
                } else if (tx.year === targetYear && tx.month >= 0 && tx.month < 12) {
                    accountMap[code].monthlyChange[tx.month] += netAmt;
                }
            }
        });

        const categories = { revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: [] };
        Object.values(accountMap).forEach(acc => {
            const code = acc.id;
            const isBS = code.startsWith('1') || code.startsWith('2') || code.startsWith('3');
            let currentBalance = acc.openingBalance;
            const processedMonthly = acc.monthlyChange.map(change => {
                if (isBS) { currentBalance += change; return currentBalance; }
                return change;
            });
            const finalAcc = { ...acc, monthly: processedMonthly };
            if (code.startsWith('4')) categories.revenue.push(finalAcc);
            else if (code.startsWith('51')) categories.cogs.push(finalAcc);
            else if (code.startsWith('5')) categories.opex.push(finalAcc);
            else if (code.startsWith('1')) categories.assets_current.push(finalAcc);
            else if (code.startsWith('2')) categories.liabilities_current.push(finalAcc);
            else if (code.startsWith('3')) categories.equity.push(finalAcc);
        });
        setFinancialData(categories);
    }, [parsedTx, selectedYear, availableYears]);

    const reportData = useMemo(() => {
        const sumM = (arr) => {
            const res = Array(12).fill(0);
            if (!arr || arr.length === 0) return res;
            arr.forEach(item => { if (item.monthly) item.monthly.forEach((v, i) => { if (i < 12) res[i] += v; }); });
            return res;
        };
        const totalRev = sumM(financialData.revenue);
        const totalCogs = sumM(financialData.cogs);
        const totalOpex = sumM(financialData.opex);
        const totalCombinedExp = totalCogs.map((c, i) => c + totalOpex[i]);
        const grossProfit = totalRev.map((r, i) => r - totalCogs[i]);
        const netIncomeMonthly = grossProfit.map((g, i) => g - totalOpex[i]);
        let runningNetProfit = 0;
        const netIncomeCumulative = netIncomeMonthly.map(val => {
            runningNetProfit += val;
            return runningNetProfit;
        });
        const totalAssets = sumM(financialData.assets_current);
        const totalLiabilities = sumM(financialData.liabilities_current);
        const totalEquityLedger = sumM(financialData.equity);
        const totalEquityReal = totalEquityLedger.map((e, i) => e + netIncomeCumulative[i]);
        const totalLiabEquity = totalLiabilities.map((l, i) => l + totalEquityReal[i]);
        const yearlyRev = totalRev.reduce((a, b) => a + b, 0);
        const yearlyNet = netIncomeMonthly.reduce((a, b) => a + b, 0);
        const netMargin = yearlyRev ? (yearlyNet / yearlyRev) * 100 : 0;
        
        let tbAccounts = [];
        const processTB = (arr) => {
            arr.forEach(acc => {
                const isBS = acc.id.startsWith('1') || acc.id.startsWith('2') || acc.id.startsWith('3');
                const isDebitNature = acc.id.startsWith('1') || acc.id.startsWith('5');
                const balance = isBS ? (acc.monthly[11] || 0) : acc.monthly.reduce((a,b)=>a+b,0);
                if (Math.abs(balance) > 0.01) {
                    let dr = 0, cr = 0;
                    if (isDebitNature) {
                        if (balance > 0) dr = balance; else cr = Math.abs(balance);
                    } else {
                        if (balance > 0) cr = balance; else dr = Math.abs(balance);
                    }
                    tbAccounts.push({ id: acc.id, name: acc.name, dr, cr });
                }
            });
        }
        processTB([...financialData.assets_current, ...financialData.liabilities_current, ...financialData.equity, ...financialData.revenue, ...financialData.cogs, ...financialData.opex]);
        tbAccounts.sort((a,b) => a.id.localeCompare(b.id));

        return {
            totalRev, totalCogs, totalOpex, totalCombinedExp, grossProfit,
            netIncomeMonthly, netIncomeCumulative,
            totalAssets, totalLiabilities, totalEquityLedger, totalEquityReal, totalLiabEquity,
            yearlyRev, yearlyNet, netMargin, tbAccounts
        };
    }, [financialData]);

    const updateTransaction = (id, newFields) => setParsedTx(prev => prev.map(t => t.id === id ? { ...t, ...newFields } : t));
    const deleteTransaction = (id) => setParsedTx(prev => prev.filter(t => t.id !== id));

    return { financialData, reportData, availableYears, parsedTx, updateTransaction, deleteTransaction };
};

// --- 4. Sub Components ---
const KPICard = ({ title, value, iconName, trend, trendValue, iconBgClass, iconColorClass }) => (
    <div className="bg-white rounded-xl p-6 border-l-4 border-[#1e3a8a] shadow-sm flex flex-col justify-between h-36 hover:shadow-md transition-shadow">
        <div className="flex justify-between items-start">
            <div className={`${iconBgClass} ${iconColorClass} p-2 rounded-lg flex items-center justify-center w-10 h-10`}>
                <Icon name={iconName} size={18} />
            </div>
            {trend && (
                <span className={`flex items-center gap-1 text-[11px] font-bold px-2 py-1 rounded-md ${trend === 'up' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                    {trend === 'up' ? <Icon name="TrendingUp" size={10} /> : <Icon name="TrendingDown" size={10} />}
                    {trendValue}
                </span>
            )}
        </div>
        <div className="mt-4">
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{title}</p>
            <h3 className="text-2xl lg:text-3xl font-black text-[#0f172a] tracking-tight truncate">{value}</h3>
        </div>
    </div>
);

const StatementRow = ({ item, isSub = false, isProfitRow = false, viewType }) => {
    const isBS = viewType === 'bs';
    const total = isBS ? (item.monthly?.[11] || 0) : (item.monthly?.reduce((a, b) => a + b, 0) || 0);
    let labelClass = "text-slate-800 font-semibold";
    if (isSub) labelClass = "text-slate-500 pl-6";
    if (isProfitRow) labelClass = "text-blue-700 font-bold pl-6";
    return (
        <tr className="hover:bg-blue-50/50 border-b border-slate-100 transition-colors group">
            <td className="sticky left-0 bg-white group-hover:bg-blue-50/50 px-4 py-3 border-r border-slate-100 z-10 w-72 truncate text-sm" title={item.name}>
                <div className={labelClass}>
                    {item.name} {!isProfitRow && <span className="text-[10px] text-slate-400 ml-2 font-mono">{item.id}</span>}
                </div>
            </td>
            {(item.monthly || Array(12).fill(0)).map((v, i) => (
                <td key={i} className={`px-2 py-3 text-right text-sm font-mono whitespace-nowrap ${v < 0 ? 'text-rose-600' : 'text-slate-600'}`}>
                    {formatCurrency(v)}
                </td>
            ))}
            <td className={`px-4 py-3 text-right text-sm font-bold bg-slate-50 group-hover:bg-blue-100/30 font-mono border-l border-slate-100 whitespace-nowrap ${total < 0 ? 'text-rose-600' : 'text-blue-950'}`}>
                {formatCurrency(total)}
            </td>
        </tr>
    );
};

const StatementTotalRow = ({ label, values, viewType, isGrandTotal = false }) => {
    const isBS = viewType === 'bs';
    const data = Array.isArray(values) ? values : Array(12).fill(0);
    const total = isBS ? (data[11] || 0) : data.reduce((a, b) => a + b, 0);
    const bgClass = isGrandTotal ? 'bg-[#0f172a] text-white' : 'bg-blue-50 text-blue-900';
    const borderClass = isGrandTotal ? '' : 'border-y border-blue-100';
    return (
        <tr className={`${bgClass} ${borderClass}`}>
            <td className={`sticky left-0 ${bgClass} px-4 py-4 z-10 text-sm font-bold tracking-wide border-r ${isGrandTotal ? 'border-slate-800' : 'border-blue-100'}`}>{label}</td>
            {data.map((v, i) => (
                <td key={i} className={`px-2 py-4 text-right text-sm font-mono font-medium whitespace-nowrap ${isGrandTotal ? 'text-slate-300' : 'text-blue-800'}`}>{formatCurrency(v)}</td>
            ))}
            <td className={`px-4 py-4 text-right text-[15px] font-black font-mono whitespace-nowrap border-l ${isGrandTotal ? 'border-slate-800 text-white' : 'border-blue-200 text-blue-950'}`}>{formatCurrency(total)}</td>
        </tr>
    );
};

// --- 5. The Main App ---
const App = () => {
    const [activeTab, setActiveTab] = useState('import');
    const [statementView, setStatementView] = useState('tb'); 
    const [isImporting, setIsImporting] = useState(false);
    const [rawCsvData, setRawCsvData] = useState(null);
    const [selectedYear, setSelectedYear] = useState("");
    const [searchVerify, setSearchVerify] = useState("");

    const [query, setQuery] = useState("");
    const [customChart, setCustomChart] = useState(null);
    const [drillDownData, setDrillDownData] = useState({ open: false, title: '', rows: [] });
    
    const [isSendingLine, setIsSendingLine] = useState(false);
    const [showNotification, setShowNotification] = useState(false);
    const [notificationMsg, setNotificationMsg] = useState("");
    const [notificationError, setNotificationError] = useState(false);

    const { financialData, reportData, availableYears, parsedTx, deleteTransaction } = useFinancialEngine(rawCsvData, selectedYear ? parseInt(selectedYear) : null);
    const importSuccess = rawCsvData !== null;

    useEffect(() => {
        if (availableYears.length > 0 && !selectedYear) setSelectedYear(availableYears[0].toString());
    }, [availableYears]);

    // AI Command Input
    const handleSmartQuery = (e) => {
        const val = e.target.value.toLowerCase();
        setQuery(val);
        if (!val) { setCustomChart(null); return; }

        if (val.includes("vs") || val.includes("เทียบ") || val.includes("สินทรัพย์") || val.includes("หนี้สิน")) {
            setCustomChart({
                type: 'bar', title: 'Asset vs Liability Analysis',

                                            {financialData.revenue.map((item, i) => <StatementRow key={i} item={item} viewType={statementView} />)}
                                            <StatementTotalRow label="Total Revenue" values={reportData.totalRev} viewType={statementView} />
                                            <tr><td colSpan="14" className="px-6 py-3 text-[11px] font-bold text-orange-600 uppercase tracking-widest bg-orange-50 pt-6">Expenses</td></tr>
                                            {[...financialData.cogs, ...financialData.opex].map((item, i) => <StatementRow key={i} item={item} isSub viewType={statementView} />)}
                                            <StatementTotalRow label="Total Expenses" values={reportData.totalCombinedExp} viewType={statementView} />
                                            <tr className="h-4"><td colSpan="14"></td></tr>
                                            <StatementTotalRow label="NET INCOME" values={reportData.netIncomeMonthly} viewType={statementView} isGrandTotal />
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    )}

                    {/* --- Empty State --- */}
                    {activeTab !== 'import' && !importSuccess && (
                        <div className="h-[60vh] flex flex-col items-center justify-center text-center animate-slide-up">
                            <div className="w-24 h-24 bg-white shadow-sm border border-slate-200 rounded-full flex items-center justify-center mb-6"><Icon name="FileText" size={40} className="text-slate-300" /></div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">No Financial Data Loaded</h2>
                            <p className="text-sm text-slate-500 mb-6">Please import a General Ledger file to generate insights.</p>
                            <button onClick={() => setActiveTab('import')} className="bg-blue-600 text-white px-6 py-3 rounded-lg text-sm font-bold hover:bg-blue-700 shadow-md">Go to Import</button>
                        </div>
                    )}
                </div>

                {/* --- Drill-down Modal --- */}
                {drillDownData.open && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center modal-overlay p-4">
                        <div className="bg-white w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden animate-slide-up max-h-[80vh] flex flex-col">
                            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                <h3 className="font-black text-[#0f172a] text-lg uppercase tracking-tight">{drillDownData.title}</h3>
                                <button onClick={() => setDrillDownData({...drillDownData, open: false})} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-200 text-slate-500 transition-all"><Icon name="Xmark" size={20} /></button>
                            </div>
                            <div className="p-0 overflow-y-auto flex-1 custom-scrollbar">
                                <table className="w-full text-left text-sm border-collapse">
                                    <thead className="sticky top-0 bg-white shadow-sm">
                                        <tr className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                                            <th className="py-4 px-6">Date</th><th className="py-4 px-6">Account</th><th className="py-4 px-6">Description</th><th className="py-4 px-6 text-right">Credit (Revenue)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-50">
                                        {drillDownData.rows.length > 0 ? drillDownData.rows.map((row) => (
                                            <tr key={row.id} className="hover:bg-blue-50/50 transition-colors">
                                                <td className="py-4 px-6 font-mono text-xs text-slate-500">{row.date}</td>
                                                <td className="py-4 px-6 font-bold text-blue-600">{row.code}</td>
                                                <td className="py-4 px-6 font-semibold text-slate-700">{row.desc || row.name}</td>
                                                <td className="py-4 px-6 text-right font-black text-emerald-600">{formatCurrency(row.rawCredit)}</td>
                                            </tr>
                                        )) : (
                                            <tr><td colSpan="4" className="py-10 text-center text-slate-400">ไม่มีข้อมูลธุรกรรมในเดือนนี้</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                            <div className="p-6 bg-slate-50 border-t border-slate-100 shrink-0">
                                <div className="flex justify-between items-center bg-blue-100/50 p-4 rounded-xl border border-blue-200">
                                    <span className="text-xs font-bold text-blue-800 uppercase">Total Monthly Revenue</span>
                                    <span className="text-xl font-black text-blue-900">฿ {drillDownData.rows.reduce((sum, r) => sum + (r.rawCredit || 0), 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </main>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
