<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์งบการเงิน (FinPulse)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- PropTypes (Required for Recharts via CDN) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Recharts -->

    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            .no-print { display: none !important; }
        }

</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer, ComposedChart, Line, PieChart, Pie, Cell } = window.Recharts;

        // --- Icons Setup (FontAwesome Wrappers) ---
        const Icon = ({ name, size = 16, className = "" }) => (
            <i className={`${name} ${className}`} style={{ fontSize: size }}></i>
        );
        const UploadIcon = (props) => <Icon name="fa-solid fa-upload" {...props} />;
        const FileTextIcon = (props) => <Icon name="fa-solid fa-file-lines" {...props} />;
        const BarChart3Icon = (props) => <Icon name="fa-solid fa-chart-column" {...props} />;
        const PrinterIcon = (props) => <Icon name="fa-solid fa-print" {...props} />;
        const AlertCircleIcon = (props) => <Icon name="fa-solid fa-circle-exclamation" {...props} />;
        const RefreshCwIcon = (props) => <Icon name="fa-solid fa-arrows-rotate" className="fa-spin" {...props} />;
        const FileSpreadsheetIcon = (props) => <Icon name="fa-solid fa-file-excel" {...props} />;
        const Trash2Icon = (props) => <Icon name="fa-solid fa-trash-can" {...props} />;
        const LayoutDashboardIcon = (props) => <Icon name="fa-solid fa-table-columns" {...props} />;
        const TrendingUpIcon = (props) => <Icon name="fa-solid fa-arrow-trend-up" {...props} />;
        const TrendingDownIcon = (props) => <Icon name="fa-solid fa-arrow-trend-down" {...props} />;
        const DollarSignIcon = (props) => <Icon name="fa-solid fa-dollar-sign" {...props} />;
        const PercentIcon = (props) => <Icon name="fa-solid fa-percent" {...props} />;
        const CheckCircle2Icon = (props) => <Icon name="fa-solid fa-circle-check" {...props} />;
        const PieChartFaIcon = (props) => <Icon name="fa-solid fa-chart-pie" {...props} />;

        // --- Helper Functions ---
        const parseNum = (str) => {
            if (!str) return 0;
            if (typeof str === 'number') return str;
            let val = str.toString().trim().replace(/,/g, '');
            if (val.startsWith('(') && val.endsWith(')')) {
                return -parseFloat(val.slice(1, -1));
            }
            return parseFloat(val) || 0;
        };

        const formatCurrency = (val) => {
            if (val === undefined || val === null) return '';
            if (Math.abs(val) < 0.01) return '-';
            const formatted = new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
            return val < 0 ? `(${new Intl.NumberFormat('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(Math.abs(val))})` : formatted;
        };

        const formatCompact = (val) => {
            if (val === undefined || val === null || isNaN(val)) return '-';
            if (val >= 1000000) return `฿${(val / 1000000).toFixed(2)}M`;
            if (val >= 1000) return `฿${(val / 1000).toFixed(0)}k`;
            return `฿${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
        };

        const formatPeriodName = (periodStr) => {
            if (!periodStr) return '';
            const [y, m] = periodStr.split('-');
            const thaiMonths = ['', 'ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `${thaiMonths[parseInt(m, 10)]} ${y.substring(2)}`;
        };

        // Smart Date Parser (รองรับ M/D/Y, D/M/Y, Y-M-D และเวลาที่ติดมา)
        const parseDateString = (str) => {
            if (!str || typeof str !== 'string') return null;
            const s = str.trim();
            
            // DD/MM/YYYY หรือ MM/DD/YYYY
            let match = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:\s.*)?$/);
            if (match) {
                let m = parseInt(match[2], 10);
                let d = parseInt(match[1], 10);
                // สลับเดือน/วัน หาก Excel ส่งมาเป็นสไตล์อเมริกา (M/D/Y)
                if (m > 12 && d <= 12) {
                    let temp = m; m = d; d = temp;
                } else if (m > 12) {
                    return null; // วันที่ผิดพลาด
                }
                let year = parseInt(match[3], 10);
                if (year < 100) year += (year < 50 ? 2000 : 1900); // แปลงปี 2 หลัก
                return { month: m.toString().padStart(2, '0'), year };
            }
            
            // YYYY-MM-DD
            match = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})(?:\s.*)?$/);
            if (match) {
                let m = parseInt(match[2], 10);
                if (m > 12) return null;
                return { month: m.toString().padStart(2, '0'), year: parseInt(match[1], 10) };
            }
            return null;
        };

        const parseCSV = (text) => {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') {
                        currentCell += '"'; i++;
                    } else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell); currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++;
                    currentRow.push(currentCell); rows.push(currentRow);
                    currentRow = []; currentCell = '';
                } else { currentCell += char; }
            }
            if (currentCell || currentRow.length > 0) { currentRow.push(currentCell); rows.push(currentRow); }
            return rows;
        };

        const PIE_COLORS = ['#4f46e5', '#3b82f6', '#0ea5e9', '#06b6d4', '#14b8a6', '#94a3b8'];

        // --- Main App Component ---
        function App() {
            const [globalAccounts, setGlobalAccounts] = useState({});
            const [globalPeriods, setGlobalPeriods] = useState(new Set());
            
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [encoding, setEncoding] = useState('windows-874'); 
            const [activeTab, setActiveTab] = useState('DASHBOARD');
            const [selectedYear, setSelectedYear] = useState('ALL');

            const availableYears = useMemo(() => {
                if (!data || !data.periods) return [];
                const years = new Set(data.periods.map(p => p.split('-')[0]));
                return Array.from(years).sort();
            }, [data]);

            const displayPeriods = useMemo(() => {
                if (!data || !data.periods) return [];
                if (selectedYear === 'ALL') return data.periods;
                return data.periods.filter(p => p.startsWith(selectedYear));
            }, [data, selectedYear]);

            const dashboardData = useMemo(() => {
                if (!data || !displayPeriods.length) return null;
                let totalRev = 0, totalExp = 0, totalNI = 0;

                const trendData = displayPeriods.map(p => {
                    const rev = data.pl.totals[p].rev || 0;
                    const exp = data.pl.totals[p].exp || 0;
                    const ni = data.pl.totals[p].ni || 0;
                    totalRev += rev; totalExp += exp; totalNI += ni;
                    return { name: formatPeriodName(p), รายได้: rev, ค่าใช้จ่าย: exp, กำไรสุทธิ: ni };
                });

                const expMap = {};
                data.pl.expenses.forEach(acc => {
                    let accTotal = 0;
                    displayPeriods.forEach(p => { accTotal += (acc.amounts[p] || 0); });
                    if (accTotal > 0) expMap[acc.name] = accTotal;
                });

                const sortedExp = Object.keys(expMap)
                    .map(k => ({ name: k, value: expMap[k] }))
                    .sort((a, b) => b.value - a.value);

                const topExp = sortedExp.slice(0, 5);
                const otherExp = sortedExp.slice(5).reduce((sum, e) => sum + e.value, 0);
                if (otherExp > 0) topExp.push({ name: 'อื่นๆ', value: otherExp });

                const margin = totalRev > 0 ? ((totalNI / totalRev) * 100).toFixed(2) : 0;
                return { totalRev, totalExp, totalNI, margin, trendData, topExp };
            }, [data, displayPeriods]);

            const clearData = () => {
                setGlobalAccounts({}); setGlobalPeriods(new Set()); setData(null);
                setSelectedYear('ALL'); setActiveTab('DASHBOARD');
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true); setError('');
                const isExcel = file.name.match(/\.xlsx?$/i);

                try {
                    if (isExcel) {
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            try {
                                const fileData = new Uint8Array(evt.target.result);
                                const workbook = window.XLSX.read(fileData, { type: 'array' });
                                const ws = workbook.Sheets[workbook.SheetNames[0]];
                                // บังคับให้ Excel คายข้อมูลวันที่เป็น text format dd/mm/yyyy เสมอ
                                const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, dateNF: 'dd/mm/yyyy', defval: "" });
                                processGLData(rows);
                            } catch (err) {
                                console.error(err); setError('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel (XLSX)');
                            } finally {
                                setLoading(false); e.target.value = null;
                            }
                        };
                        reader.onerror = () => { setError('ไม่สามารถอ่านไฟล์ได้'); setLoading(false); };
                        reader.readAsArrayBuffer(file);
                    } else {
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            try {
                                const text = evt.target.result.replace(/^\uFEFF/, '');
                                const rows = parseCSV(text);
                                processGLData(rows);
                            } catch (err) {
                                console.error(err); setError('เกิดข้อผิดพลาดในการอ่านไฟล์ CSV โปรดตรวจสอบรูปแบบไฟล์');
                            } finally {
                                setLoading(false); e.target.value = null; 
                            }
                        };
                        reader.onerror = () => { setError('ไม่สามารถอ่านไฟล์ได้'); setLoading(false); };
                        reader.readAsText(file, encoding);
                    }
                } catch (err) {
                    setError('ระบบผิดพลาด'); setLoading(false);
                }
            };

            const processGLData = (rows) => {
                const accounts = { ...globalAccounts };
                const periodsSet = new Set(globalPeriods);
                let currentAccount = null;

                rows.forEach((row) => {
                    if (!row || row.length < 2) return;
                    const cleanRow = row.map(cell => cell !== undefined && cell !== null ? cell.toString().trim() : '');

                    // การตรวจจับโครงสร้างหัวตาราง (Header)
                    const isExpressOrig = cleanRow[1] && /^[1-5]\d{3}/.test(cleanRow[1]) && !cleanRow[1].includes('/') && !parseDateString(cleanRow[1]);
                    const isExpressShift = cleanRow[0] && /^[1-5]\d{3}/.test(cleanRow[0]) && !cleanRow[0].includes('(') && !cleanRow[0].includes('/') && !parseDateString(cleanRow[0]);
                    const isPeak = cleanRow[0] && /^(\d+)\s*\((.*)\)/.test(cleanRow[0]);

                    if (isExpressOrig) {
                        const codeStr = cleanRow[1], nameStr = cleanRow[3] || '', bf = parseNum(cleanRow[9]), category = parseInt(codeStr[0], 10);
                        if (!accounts[codeStr]) accounts[codeStr] = { code: codeStr, name: nameStr, category, bf: 0, bf_set: false, format: 'ExpressOrig', transactions: [] };
                        if (bf !== 0 && !accounts[codeStr].bf_set) { accounts[codeStr].bf = bf; accounts[codeStr].bf_set = true; }
                        currentAccount = accounts[codeStr];
                    } else if (isExpressShift) {
                        const codeStr = cleanRow[0], nameStr = cleanRow[2] || '', bf = parseNum(cleanRow[8]), category = parseInt(codeStr[0], 10);
                        if (!accounts[codeStr]) accounts[codeStr] = { code: codeStr, name: nameStr, category, bf: 0, bf_set: false, format: 'ExpressShift', transactions: [] };
                        if (bf !== 0 && !accounts[codeStr].bf_set) { accounts[codeStr].bf = bf; accounts[codeStr].bf_set = true; }
                        currentAccount = accounts[codeStr];
                    } else if (isPeak) {
                        const match = cleanRow[0].match(/^(\d+)\s*\((.*)\)/);
                        const codeStr = match[1], nameStr = match[2], category = parseInt(codeStr[0], 10);
                        if (!accounts[codeStr]) accounts[codeStr] = { code: codeStr, name: nameStr, category, bf: 0, bf_set: false, format: 'Peak', transactions: [] };
                        currentAccount = accounts[codeStr];
                    }

                    if (currentAccount) {
                        // ตรวจจับคำว่า 'ยอดยกมา' สำหรับ PEAK
                        const bfIndex = cleanRow.findIndex(cell => cell.includes("ยอดยกมา"));
                        if (bfIndex !== -1 && !currentAccount.bf_set) {
                            let bfDr = parseNum(cleanRow[bfIndex + 1]), bfCr = parseNum(cleanRow[bfIndex + 2]);
                            const isDebitNature = currentAccount.category === 1 || currentAccount.category === 5;
                            currentAccount.bf += (isDebitNature ? (bfDr - bfCr) : (bfCr - bfDr));
                            currentAccount.bf_set = true;
                        }

                        let parsedDate = null, dr = 0, cr = 0;
                        
                        // ค้นหาตำแหน่งวันที่ แบบยืดหยุ่นตาม Format ที่ตรวจเจอ
                        if (currentAccount.format === 'ExpressOrig') {
                            if (cleanRow[1] && parseDateString(cleanRow[1])) { 
                                parsedDate = parseDateString(cleanRow[1]); dr = parseNum(cleanRow[6]); cr = parseNum(cleanRow[7]); 
                            }
                        } else if (currentAccount.format === 'ExpressShift') {
                            if (cleanRow[0] && parseDateString(cleanRow[0])) { 
                                parsedDate = parseDateString(cleanRow[0]); dr = parseNum(cleanRow[5]); cr = parseNum(cleanRow[6]); 
                            }
                        } else if (currentAccount.format === 'Peak') {
                            // สแกนหาช่องวันที่ใน 5 คอลัมน์แรก (แก้ปัญหา Cell ใน Excel ถูกผสาน)
                            let dateIdx = -1;
                            for(let i=0; i<=5; i++) {
                                if (cleanRow[i] && parseDateString(cleanRow[i])) { dateIdx = i; break; }
                            }
                            if (dateIdx !== -1) {
                                parsedDate = parseDateString(cleanRow[dateIdx]);
                                dr = parseNum(cleanRow[dateIdx + 4]); 
                                cr = parseNum(cleanRow[dateIdx + 5]);
                            }
                        }

                        if (parsedDate) {
                            let yearNum = parsedDate.year;
                            if (yearNum < 2500) yearNum += 543; // แปลง ค.ศ. เป็น พ.ศ. อัตโนมัติ
                            const periodStr = `${yearNum}-${parsedDate.month}`;
                            periodsSet.add(periodStr);
                            currentAccount.transactions.push({ period: periodStr, dr, cr });
                        }
                    }
                });

                if (periodsSet.size === 0) { 
                    setError('ไม่พบข้อมูลรายการเคลื่อนไหว (กรุณาตรวจสอบว่ามีวันที่ในไฟล์ หรือรูปแบบถูกหรือไม่)'); 
                    return; 
                }

                setGlobalAccounts(accounts); 
                setGlobalPeriods(periodsSet); 
                generateReport(accounts, periodsSet);
            };

            const generateReport = (accounts, periodsSet) => {
                const periods = Array.from(periodsSet).sort();

                const aggregated = Object.values(accounts).map(acc => {
                    let currentBalance = acc.bf; const periodData = {};
                    periods.forEach(period => {
                        const txs = acc.transactions.filter(t => t.period === period);
                        const drSum = txs.reduce((sum, t) => sum + t.dr, 0), crSum = txs.reduce((sum, t) => sum + t.cr, 0);
                        currentBalance = currentBalance + drSum - crSum;
                        periodData[period] = { netChange: drSum - crSum, endBalance: currentBalance };
                    });
                    return { ...acc, periodData };
                });

                const reportData = { periods, pl: { revenues: [], expenses: [], totals: {} }, bs: { assets: [], liabilities: [], equities: [], totals: {} } };
                periods.forEach(p => {
                    reportData.pl.totals[p] = { rev: 0, exp: 0, ni: 0 };
                    reportData.bs.totals[p] = { asset: 0, liab: 0, baseEq: 0, totalEq: 0, retEarnBf: 0, currentNI: 0, totalLE: 0 };
                });

                aggregated.forEach(acc => {
                    const rowData = { code: acc.code, name: acc.name, amounts: {} };
                    let hasPLData = false, hasBSData = false;

                    periods.forEach(p => {
                        const pData = acc.periodData[p];
                        if (acc.category === 4) { const val = -pData.netChange; rowData.amounts[p] = val; reportData.pl.totals[p].rev += val; if (Math.abs(val) > 0.01) hasPLData = true; } 
                        else if (acc.category === 5) { const val = pData.netChange; rowData.amounts[p] = val; reportData.pl.totals[p].exp += val; if (Math.abs(val) > 0.01) hasPLData = true; }

                        if (acc.category === 1) { const val = pData.endBalance; rowData.amounts[p] = val; reportData.bs.totals[p].asset += val; if (Math.abs(val) > 0.01) hasBSData = true; } 
                        else if (acc.category === 2) { const val = -pData.endBalance; rowData.amounts[p] = val; reportData.bs.totals[p].liab += val; if (Math.abs(val) > 0.01) hasBSData = true; } 
                        else if (acc.category === 3) { const val = -pData.endBalance; rowData.amounts[p] = val; reportData.bs.totals[p].baseEq += val; if (Math.abs(val) > 0.01) hasBSData = true; }
                    });

                    if (hasPLData && acc.category === 4) reportData.pl.revenues.push(rowData);
                    if (hasPLData && acc.category === 5) reportData.pl.expenses.push(rowData);
                    if (hasBSData && acc.category === 1) reportData.bs.assets.push(rowData);
                    if (hasBSData && acc.category === 2) reportData.bs.liabilities.push(rowData);
                    if (hasBSData && acc.category === 3) reportData.bs.equities.push(rowData);
                });

                periods.forEach((p) => {
                    reportData.pl.totals[p].ni = reportData.pl.totals[p].rev - reportData.pl.totals[p].exp;
                    reportData.bs.totals[p].currentNI = reportData.pl.totals[p].ni;
                    const plugRetEarnBf = reportData.bs.totals[p].asset - reportData.bs.totals[p].liab - reportData.bs.totals[p].baseEq - reportData.bs.totals[p].currentNI;
                    reportData.bs.totals[p].retEarnBf = plugRetEarnBf;
                    reportData.bs.totals[p].totalEq = reportData.bs.totals[p].baseEq + plugRetEarnBf + reportData.bs.totals[p].currentNI;
                    reportData.bs.totals[p].totalLE = reportData.bs.totals[p].liab + reportData.bs.totals[p].totalEq;
                });

                setData(reportData); setActiveTab('DASHBOARD');
            };

            const handleExportExcel = () => {
                const XLSX = window.XLSX;
                if (!XLSX) { alert('ไลบรารี Excel กำลังโหลด กรุณารอสักครู่แล้วกดใหม่'); return; }

                const wb = XLSX.utils.book_new();
                const periods = displayPeriods;
                const periodHeaders = periods.map(formatPeriodName);

                const styles = {
                    header: { fill: { fgColor: { rgb: "172554" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 }, alignment: { horizontal: "center", vertical: "center" } },
                    month: { fill: { fgColor: { rgb: "1E3A8A" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 10 }, alignment: { horizontal: "center", vertical: "center" }, border: { left: { style: "thin", color: { rgb: "DBEAFE" } } } },
                    year: { fill: { fgColor: { rgb: "1D4ED8" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 }, alignment: { horizontal: "center", vertical: "center" } },
                    group: { fill: { fgColor: { rgb: "EFF6FF" } }, font: { bold: true, color: { rgb: "1E3A8A" } } },
                    total: { fill: { fgColor: { rgb: "DBEAFE" } }, font: { bold: true, color: { rgb: "1E3A8A" } }, border: { top: { style: "thin", color: { rgb: "93C5FD" } }, bottom: { style: "thin", color: { rgb: "93C5FD" } } } },
                    grand: { fill: { fgColor: { rgb: "172554" } }, font: { bold: true, color: { rgb: "FFFFFF" } } },
                    currency: { alignment: { horizontal: "right" }, numFmt: "#,##0.00;[Red](#,##0.00)", font: { sz: 10 } }
                };

                const buildSheet = (sheetName, sections, viewType) => {
                    const sheetData = [["รหัสบัญชี", "ชื่อบัญชี", ...periodHeaders, viewType === 'PL' ? "รวมทั้งสิ้น" : "ยอดคงเหลือล่าสุด"]];
                    sections.forEach(sec => {
                        sheetData.push([sec.title.toUpperCase()]);
                        sec.items.forEach(it => {
                            const vals = periods.map(p => it.amounts[p] || 0);
                            const t = viewType === 'PL' ? vals.reduce((a,b)=>a+b,0) : (vals[vals.length - 1] || 0);
                            sheetData.push([it.code, it.name, ...vals, t]);
                        });
                        if (sec.totalRow) {
                            const totalVals = periods.map(p => sec.totalValues(p));
                            const gt = viewType === 'PL' ? totalVals.reduce((a,b)=>a+b,0) : (totalVals[totalVals.length - 1] || 0);
                            sheetData.push([sec.totalLabel, "", ...totalVals, gt]);
                        }
                        sheetData.push([]); 
                    });

                    const ws = XLSX.utils.aoa_to_sheet(sheetData);

                            if (!ws[ref]) continue;
                            if (R === 0) {

                                else if (C < 2 + periods.length) ws[ref].s = styles.month;
                                else ws[ref].s = styles.year;

                                const v1 = ws[XLSX.utils.encode_cell({c:1, r:R})]?.v;
                                if (v0 && !v1 && R > 0) ws[ref].s = styles.group;

                            }
                        }
