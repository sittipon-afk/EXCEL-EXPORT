<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinPulse - Enterprise Financial Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f4f7fb; }
    .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    @media print {
        body { background: white !important; }
        .no-print { display: none !important; }
        .no-print-padding { padding: 0 !important; }
        .border, .shadow-sm { box-shadow: none !important; border: none !important; border-bottom: 1px solid #f1f5f9 !important; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
</style>
</head>
<body class="text-slate-900 overflow-hidden">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell, ComposedChart } = window.Recharts;

// --- Icon Wrapper ---
const Icon = ({ name, size = 16, className = "" }) => {
    const faMap = {
        Upload: 'fa-upload', FileText: 'fa-file-lines', BarChart3: 'fa-chart-column',
        TrendingUp: 'fa-arrow-trend-up', TrendingDown: 'fa-arrow-trend-down',
        Loader2: 'fa-circle-notch fa-spin', Printer: 'fa-print', Database: 'fa-database',
        CheckCircle2: 'fa-circle-check', FileSpreadsheet: 'fa-file-excel',
        PieChartIcon: 'fa-chart-pie', DollarSign: 'fa-dollar-sign',
        Layers: 'fa-layer-group', ListCheck: 'fa-list-check', Trash: 'fa-trash'
    };
    return <i className={`fa-solid ${faMap[name] || 'fa-star'} ${className}`} style={{ fontSize: size }}></i>;
};

// --- Formatting Utils ---
const MONTHS_SHORT = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
const COLORS = ['#1e3a8a', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'];

const formatCurrency = (val) => {
    if (val === undefined || val === null || isNaN(val)) return '-';
    if (Math.abs(val) < 0.01) return '-';
    const formatted = Math.abs(val).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return val < 0 ? `(${formatted})` : formatted;
};

const formatCompact = (val) => {
    if (!val || isNaN(val)) return '฿ 0';
    if (Math.abs(val) >= 1000000) return `฿ ${(val / 1000000).toFixed(2)}M`;
    if (Math.abs(val) >= 1000) return `฿ ${(val / 1000).toFixed(0)}k`;
    return `฿ ${val.toLocaleString()}`;
};

// --- Accounting Engine ---
const useFinancialEngine = (csvDataRows, selectedYear) => {
    const [availableYears, setAvailableYears] = useState([]);
    const [parsedTx, setParsedTx] = useState([]);
    const [financialData, setFinancialData] = useState({
        revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: []
    });

    useEffect(() => {
        if (!csvDataRows || csvDataRows.length === 0) return;
        const closingKeywords = ["ปิดบัญชี", "ยอดยกไป", "closing", "โอนปิด", "โอนกำไร", "ปีเก่า"];
        let headerRowIdx = -1;
        let colMap = {};
        
        for(let i=0; i<Math.min(20, csvDataRows.length); i++) {
            const rowStr = csvDataRows[i]?.map(c => String(c||'').toLowerCase()).join('|') || "";
            if((rowStr.includes('รหัสบัญชี') || rowStr.includes('account code')) && (rowStr.includes('เดบิต') || rowStr.includes('debit'))) {
                headerRowIdx = i;
                csvDataRows[i].forEach((col, idx) => {
                    const c = String(col||'').toLowerCase();
                    if(c.includes('รหัสบัญชี')) colMap.code = idx;
                    else if(c.includes('ชื่อบัญชี')) colMap.name = idx;
                    else if(c === 'วันที่' || c === 'date') colMap.date = idx;
                    else if(c.includes('เดบิต')) colMap.debit = idx;
                    else if(c.includes('เครดิต')) colMap.credit = idx;
                });
                break;
            }
        }
        
        let flatTransactions = [];
        let yearsSet = new Set();
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Simple Parser Logic
        csvDataRows.forEach((row, idx) => {
            if (idx <= headerRowIdx || !row) return;
            const code = String(row[colMap.code] || "").trim();
            if (!code || isNaN(code.charAt(0))) return;

            const dateStr = String(row[colMap.date] || "");
            const rowStr = row.join("|");
            if (closingKeywords.some(kw => rowStr.includes(kw))) return;

            let year = -1, month = -1;
            if (dateStr.includes('/')) {
                const parts = dateStr.split('/');
                year = parseInt(parts[2]);
                month = parseInt(parts[1]) - 1;
                if (year > 2500) year -= 543;
            }

            if (year !== -1) {
                yearsSet.add(year);
                flatTransactions.push({
                    id: generateId(), date: dateStr, code, name: String(row[colMap.name] || ""),
                    year, month, rawDebit: parseFloat(String(row[colMap.debit]||'').replace(/,/g,'')) || 0,
                    rawCredit: parseFloat(String(row[colMap.credit]||'').replace(/,/g,'')) || 0
                });
            }
        });

        setParsedTx(flatTransactions);
        setAvailableYears(Array.from(yearsSet).sort((a,b)=>b-a));
    }, [csvDataRows]);

    useEffect(() => {
        if (parsedTx.length === 0) return;
        const targetYear = selectedYear ? parseInt(selectedYear) : availableYears[0];
        const accountMap = {};

        parsedTx.forEach(tx => {
            if (tx.year !== targetYear) return;
            const code = tx.code;
            if (!accountMap[code]) accountMap[code] = { id: code, name: tx.name, monthly: Array(12).fill(0) };
            
            const isDebitNature = code.startsWith('1') || code.startsWith('5');
            const net = isDebitNature ? (tx.rawDebit - tx.rawCredit) : (tx.rawCredit - tx.rawDebit);
            if (tx.month >= 0 && tx.month < 12) accountMap[code].monthly[tx.month] += net;
        });

        const cats = { revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: [] };
        Object.values(accountMap).forEach(acc => {
            if (acc.id.startsWith('4')) cats.revenue.push(acc);
            else if (acc.id.startsWith('51')) cats.cogs.push(acc);
            else if (acc.id.startsWith('5')) cats.opex.push(acc);
            else if (acc.id.startsWith('1')) cats.assets_current.push(acc);
            else if (acc.id.startsWith('2')) cats.liabilities_current.push(acc);
            else if (acc.id.startsWith('3')) cats.equity.push(acc);
        });
        setFinancialData(cats);
    }, [parsedTx, selectedYear, availableYears]);

    const reportData = useMemo(() => {
        const sumM = (arr) => {
            const res = Array(12).fill(0);
            arr.forEach(item => item.monthly.forEach((v, i) => res[i] += v));
            return res;
        };
        const totalRev = sumM(financialData.revenue);
        const totalExp = sumM([...financialData.cogs, ...financialData.opex]);
        const netIncomeMonthly = totalRev.map((r, i) => r - totalExp[i]);
        const yearlyRev = totalRev.reduce((a,b)=>a+b, 0);
        const yearlyNet = netIncomeMonthly.reduce((a,b)=>a+b, 0);

        let tb = [];
        [...financialData.assets_current, ...financialData.liabilities_current, ...financialData.equity, ...financialData.revenue, ...financialData.opex].forEach(acc => {
            const bal = acc.monthly.reduce((a,b)=>a+b,0);
            if (Math.abs(bal) > 0.01) {
                const isDr = acc.id.startsWith('1') || acc.id.startsWith('5');
                tb.push({ id: acc.id, name: acc.name, dr: isDr ? (bal > 0 ? bal : 0) : (bal < 0 ? -bal : 0), cr: !isDr ? (bal > 0 ? bal : 0) : (bal < 0 ? -bal : 0) });
            }
        });

        return { totalRev, totalExp, netIncomeMonthly, yearlyRev, yearlyNet, tb };
    }, [financialData]);

    return { financialData, reportData, availableYears, parsedTx };
};

// --- Main Application ---
const App = () => {
    const [activeTab, setActiveTab] = useState('import');
    const [isImporting, setIsImporting] = useState(false);
    const [rawCsvData, setRawCsvData] = useState(null);
    const [selectedYear, setSelectedYear] = useState("");
    const { financialData, reportData, availableYears, parsedTx } = useFinancialEngine(rawCsvData, selectedYear);

    // ✅ กู้คืนระบบ EXPORT EXCEL (พร้อมใส่หัวตารางสี)
    const handleExportExcel = () => {
        if (!rawCsvData) return;
        const wb = XLSX.utils.book_new();
        const styles = {
            header: { fill: { fgColor: { rgb: "1E3A8A" } }, font: { color: { rgb: "FFFFFF" }, bold: true }, alignment: { horizontal: "center" } },
            cell: { font: { sz: 10 } },
            number: { alignment: { horizontal: "right" }, numFmt: "#,##0.00" }
        };

        // 1. Profit & Loss Sheet
        const pnlRows = [["Account Code", "Account Name", ...MONTHS_SHORT, "Total"]];
        financialData.revenue.forEach(acc => pnlRows.push([acc.id, acc.name, ...acc.monthly, acc.monthly.reduce((a,b)=>a+b,0)]));
        const wsPnl = XLSX.utils.aoa_to_sheet(pnlRows);
        // Apply Header Style
        for (let i=0; i<15; i++) {
            const cellRef = XLSX.utils.encode_cell({r:0, c:i});
            if (wsPnl[cellRef]) wsPnl[cellRef].s = styles.header;
        }
        XLSX.utils.book_append_sheet(wb, wsPnl, "Profit and Loss");

        // 2. Trial Balance Sheet
        const tbRows = [["Code", "Name", "Debit", "Credit"]];
        reportData.tb.forEach(item => tbRows.push([item.id, item.name, item.dr, item.cr]));
        const wsTb = XLSX.utils.aoa_to_sheet(tbRows);
        for (let i=0; i<4; i++) {
            const cellRef = XLSX.utils.encode_cell({r:0, c:i});
            if (wsTb[cellRef]) wsTb[cellRef].s = styles.header;
        }
        XLSX.utils.book_append_sheet(wb, wsTb, "Trial Balance");

        XLSX.writeFile(wb, `Financial_Report_${selectedYear || '2026'}.xlsx`);
    };

    const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsImporting(true);
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = XLSX.read(evt.target.result, { type: 'array' });
            const sheet = data.Sheets[data.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            setRawCsvData(rows);
            setTimeout(() => { setIsImporting(false); setActiveTab('dashboard'); }, 500);
        };
        reader.readAsArrayBuffer(file);
    };

    return (
        <div className="flex h-screen overflow-hidden">
            {/* Sidebar */}
            <aside className="w-64 bg-[#1e2235] flex flex-col z-50 shadow-xl shrink-0 no-print">
                <div className="h-20 flex items-center px-6 border-b border-slate-700/50">
                    <div className="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white mr-3">
                        <Icon name="Layers" size={16} />
                    </div>
                    <h1 className="text-xl font-bold tracking-tight text-white">Fin<span className="text-blue-400">Pulse</span></h1>
                </div>
                <div className="flex-1 py-6 px-4 space-y-2">
                    <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Finance Engine</p>
                    {[
                        { id: 'import', icon: 'Upload', label: 'Data Import' },
                        { id: 'dashboard', icon: 'BarChart3', label: 'Performance Analytics' },
                        { id: 'statements', icon: 'FileText', label: 'Ledger Statements' },
                    ].map(item => (
                        <button key={item.id} onClick={() => setActiveTab(item.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm font-semibold ${activeTab === item.id ? 'bg-[#2563eb] text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                            <Icon name={item.icon} size={16} />
                            <span>{item.label}</span>
                        </button>
                    ))}
                </div>
                <div className="p-6 border-t border-slate-700/50 text-white flex items-center gap-3">
                    <div className="w-9 h-9 bg-blue-800 rounded-full flex items-center justify-center font-bold">AM</div>
                    <div><p className="text-sm font-bold">Amper Co., Ltd.</p><p className="text-[10px] text-slate-400">Active Workspace</p></div>
                </div>
            </aside>

            {/* Main Content */}
            <main className="flex-1 flex flex-col h-full overflow-hidden bg-[#f4f7fb]">
                <header className="h-20 flex items-center justify-between px-8 shrink-0 no-print">
                    <div className="flex items-center gap-4">
                        <h2 className="font-bold text-xl text-[#0f172a] tracking-tight">Financial Overview</h2>
                        <div className="flex items-center bg-white border border-slate-200 rounded-full h-8 px-3 shadow-sm">
                            <span className="text-[10px] font-bold text-blue-600 mr-2 border-r pr-2">FY</span>
                            <select value={selectedYear} onChange={(e)=>setSelectedYear(e.target.value)} className="text-xs font-bold bg-transparent outline-none">
                                {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                        {rawCsvData && <span className="flex items-center gap-1.5 px-3 py-1.5 text-emerald-600 bg-emerald-50 border border-emerald-100 rounded-lg text-xs font-bold"><Icon name="CheckCircle2" size={14} /> Data Synced</span>}
                        <button onClick={handleExportExcel} disabled={!rawCsvData} className="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-800 disabled:opacity-50 flex items-center gap-2">
                            <Icon name="FileSpreadsheet" /> Export to Excel
                        </button>
                    </div>
                </header>

                <div className="flex-1 overflow-y-auto p-8 pt-2 custom-scrollbar">
                    {activeTab === 'import' && (
                        <div className="max-w-2xl mx-auto mt-10 animate-fade-in text-center">
                            <div className="bg-white p-12 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="Database" size={32} /></div>
                                <h3 className="text-2xl font-bold mb-2">Upload General Ledger</h3>
                                <p className="text-slate-500 mb-8 text-sm">เลือกไฟล์ .xlsx หรือ .csv เพื่อสร้างรายงานโดยอัตโนมัติ</p>
                                <label className="border-2 border-dashed border-blue-200 rounded-2xl p-10 block cursor-pointer hover:bg-blue-50 transition-all group">
                                    <input type="file" className="hidden" onChange={handleFileUpload} />
                                    {isImporting ? <Icon name="Loader2" size={40} className="text-blue-500" /> : <Icon name="Upload" size={40} className="text-slate-300 group-hover:text-blue-500" />}
                                    <p className="mt-4 font-bold text-slate-700 italic">Click or drag file here</p>
                                </label>
                            </div>
                        </div>
                    )}

                    {activeTab === 'dashboard' && rawCsvData && (
                        <div className="max-w-7xl mx-auto space-y-6 animate-fade-in">
                            {/* KPI Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <KPICard title="REVENUE YTD" value={formatCompact(reportData.yearlyRev)} iconName="TrendingUp" iconBgClass="bg-blue-50" iconColorClass="text-blue-600" />
                                <KPICard title="EXPENSES YTD" value={formatCompact(reportData.totalExp.reduce((a,b)=>a+b,0))} iconName="TrendingDown" iconBgClass="bg-blue-50" iconColorClass="text-blue-600" />
                                <KPICard title="NET INCOME" value={formatCompact(reportData.yearlyNet)} iconName="DollarSign" iconBgClass="bg-blue-50" iconColorClass="text-blue-600" />
                                <KPICard title="NET MARGIN" value={`${((reportData.yearlyNet/reportData.yearlyRev)*100 || 0).toFixed(1)}%`} iconName="PieChartIcon" iconBgClass="bg-blue-50" iconColorClass="text-blue-600" />
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 bg-white p-6 rounded-xl border shadow-sm h-[400px]">
                                    <p className="text-sm font-bold mb-6">Income vs Expense Trend</p>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <ComposedChart data={MONTHS_SHORT.map((m, i) => ({ name: m, Rev: reportData.totalRev[i], Exp: reportData.totalExp[i] }))}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 11}} />
                                            <YAxis axisLine={false} tickLine={false} tick={{fontSize: 11}} tickFormatter={(v)=>`${v/1000}k`} />
                                            <Tooltip formatter={(v)=>`฿${v.toLocaleString()}`} />
                                            <Bar dataKey="Rev" fill="#1e3a8a" radius={[4, 4, 0, 0]} maxBarSize={30} />
                                            <Bar dataKey="Exp" fill="#60a5fa" radius={[4, 4, 0, 0]} maxBarSize={30} />
                                        </ComposedChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="bg-white p-6 rounded-xl border shadow-sm h-[400px] flex flex-col">
                                    <p className="text-sm font-bold mb-4">Top Expenses</p>
                                    <div className="flex-1 relative">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={[{name: 'Exp', value: 100}]} innerRadius="65%" outerRadius="85%" dataKey="value">
                                                    <Cell fill="#1e3a8a" />
                                                </Pie>
                                            </PieChart>
                                        </ResponsiveContainer>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-[10px] text-slate-400 font-bold">TOTAL</span>
                                            <span className="text-lg font-black">{formatCompact(reportData.totalExp.reduce((a,b)=>a+b,0))}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </main>
        </div>
    );
};

// --- KPI Card Sub-component ---
const KPICard = ({ title, value, iconName, iconBgClass, iconColorClass }) => (
    <div className="bg-white rounded-xl p-6 border-l-4 border-[#1e3a8a] shadow-sm flex flex-col justify-between h-36">
        <div className={`${iconBgClass} ${iconColorClass} p-2 rounded-lg flex items-center justify-center w-10 h-10`}>
            <Icon name={iconName} size={18} />
        </div>
        <div className="mt-4">
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{title}</p>
            <h3 className="text-2xl font-black text-[#0f172a] tracking-tight">{value}</h3>
        </div>
    </div>
);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
