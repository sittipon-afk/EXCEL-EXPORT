<script type="text/babel">
const { useState, useMemo, useEffect } = React;
// เพิ่มการนำเข้า AreaChart, RadarChart และส่วนประกอบที่เกี่ยวข้องจาก Recharts
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell, ComposedChart, AreaChart, Area, Radar, RadarChart, PolarGrid, PolarAngleAxis, Legend } = window.Recharts;

// --- Icon Wrapper ---
const Icon = ({ name, size = 16, className = "" }) => {
const faMap = {
Upload: 'fa-solid fa-upload',
FileText: 'fa-solid fa-file-lines',
BarChart3: 'fa-solid fa-chart-column',
TrendingUp: 'fa-solid fa-arrow-trend-up',
TrendingDown: 'fa-solid fa-arrow-trend-down',
Loader2: 'fa-solid fa-circle-notch fa-spin',
Calendar: 'fa-regular fa-calendar',
Printer: 'fa-solid fa-print',
Landmark: 'fa-solid fa-building-columns',
Database: 'fa-solid fa-database',
CheckCircle2: 'fa-solid fa-circle-check',
FileSpreadsheet: 'fa-solid fa-file-excel',
PieChartIcon: 'fa-solid fa-chart-pie',
DollarSign: 'fa-solid fa-dollar-sign',

ArrowDownRight: 'fa-solid fa-arrow-down',

};
return <i className={`${faMap[name] || 'fa-solid fa-star'} ${className}`} style={{ fontSize: size }}></i>;
};

// --- Global Utils & Formatting ---
const MONTHS_SHORT = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
const COLORS = ['#1e3a8a', '#1d4ed8', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'];

const formatCurrency = (val) => {
if (val === undefined || val === null || isNaN(val)) return '-';
if (Math.abs(val) < 0.01) return '-';
const formatted = Math.abs(val).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
return val < 0 ? `(${formatted})` : formatted;
};

const formatCompact = (val) => {
if (val === undefined || val === null || isNaN(val)) return '-';
if (Math.abs(val) >= 1000000) return `฿ ${(val / 1000000).toFixed(2)}M`;
if (Math.abs(val) >= 1000) return `฿ ${(val / 1000).toFixed(0)}k`;
return `฿ ${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

// --- Helper Date Parse ---
const parseDateToYearMonth = (dateVal) => {
    if (!dateVal) return { year: -1, month: -1 };
    if (typeof dateVal === 'number') {
        const date = new Date((dateVal - (25567 + 1)) * 86400 * 1000);
        return { year: date.getFullYear(), month: date.getMonth() };
    }
    const strDate = dateVal.toString().trim();
    if (strDate.includes('/')) {
        const parts = strDate.split('/');
        if (parts[0].length === 4) return { year: parseInt(parts[0], 10), month: parseInt(parts[1], 10) - 1 };
        return { year: parseInt(parts[2], 10), month: parseInt(parts[1], 10) - 1 };
    } else if (strDate.includes('-')) {
        const parts = strDate.split('-');
        if (parts[0].length === 4) return { year: parseInt(parts[0], 10), month: parseInt(parts[1], 10) - 1 };
        return { year: parseInt(parts[2], 10), month: parseInt(parts[1], 10) - 1 };
    }
    return { year: -1, month: -1 };
};

const cleanNumber = (val) => {
    if (!val) return 0;
    if (typeof val === 'number') return val;
    return parseFloat(val.toString().replace(/,/g, '')) || 0;
};

// --- Accounting Engine ---
const useFinancialEngine = (csvDataRows, selectedYear) => {
    const [availableYears, setAvailableYears] = useState([]);
    const [parsedTx, setParsedTx] = useState([]);
    const [financialData, setFinancialData] = useState({
        revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: []
    });

    useEffect(() => {
        if (!csvDataRows || csvDataRows.length === 0) return;
        
        const isExpress = csvDataRows.slice(0, 15).some(r => r[0] && String(r[0]).replace(/\s/g, '').includes('รายงานแยกประเภท'));
        const closingKeywords = ["ปิดบัญชี", "ยอดยกไป", "closing", "โอนปิด", "โอนกำไร", "ปิดยอด", "year end", "ปิดงบ", "โอนบัญชี"];
        
        let headerRowIdx = -1;
        let colMap = {};
        for(let i=0; i<Math.min(20, csvDataRows.length); i++) {
            const row = csvDataRows[i];
            if(!row) continue;
            const rowStr = row.map(c => String(c||'').toLowerCase()).join('|');
            if((rowStr.includes('รหัสบัญชี') || rowStr.includes('account code')) && (rowStr.includes('เดบิต') || rowStr.includes('debit'))) {
                headerRowIdx = i;
                row.forEach((col, idx) => {
                    const c = String(col||'').toLowerCase();
                    if(c.includes('รหัสบัญชี') || c.includes('account code')) colMap.code = idx;
                    else if(c.includes('ชื่อบัญชี') || c.includes('account name')) colMap.name = idx;
                    else if(c === 'วันที่' || c === 'date') colMap.date = idx;
                    else if(c === 'เดบิต' || c === 'debit' || c.includes('debit')) colMap.debit = idx;
                    else if(c === 'เครดิต' || c === 'credit' || c.includes('credit')) colMap.credit = idx;
                });
                break;
            }
        }
        
        let flatTransactions = [];
        let yearsSet = new Set();
        
        const generateId = () => Math.random().toString(36).substr(2, 9);

        if (isExpress) {
            let curCode = "";
            let curName = "";
            let seenAccounts = new Set(); 
            csvDataRows.forEach(row => {
                if (!row || !row[0]) return;
                const col0 = String(row[0]).trim();
                
                if (col0.includes('บริษัท') || col0.includes('รายงาน') || col0.includes('วันที่จาก') || 
                    col0.includes('เลขที่บัญชี') || col0.includes('พิมพ์โดย') || col0 === 'วันที่' || col0 === 'รวม') return; 

                if (/^[a-zA-Z0-9-\.]{4,}$/.test(col0) && !col0.includes('/') && !col0.match(/[ก-๙]/)) {
                    curCode = col0;
                    curName = String(row[2] || "").trim();
                    
                    if (!seenAccounts.has(curCode)) {
                        seenAccounts.add(curCode);
                        let openBal = parseFloat(String(row[8] || "").replace(/,/g, ''));
                        if (isNaN(openBal) && row.length > 0) openBal = parseFloat(String(row[row.length - 1] || "").replace(/,/g, ''));
                        
                        if (!isNaN(openBal) && openBal !== 0) {
                            flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: openBal>0?openBal:0, rawCredit: openBal<0?Math.abs(openBal):0 });
                        }
                    }
                } 
                else if (col0.includes('/') && col0.split('/').length >= 3) {
                    const desc = String(row[3] || "").trim();
                    const descLower = desc.toLowerCase();
                    
                    if (desc.includes('ยอดยกมา') || closingKeywords.some(kw => descLower.includes(kw))) return; 

                    const { year, month } = parseDateToYearMonth(col0);
                    const debit = cleanNumber(row[5]);
                    const credit = cleanNumber(row[6]);
                    
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: col0, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: debit, rawCredit: credit });
                }
            });
        } else if (headerRowIdx !== -1 && colMap.code !== undefined && colMap.debit !== undefined) {
            let seenAccountsSmart = new Set();
            for(let i = headerRowIdx + 1; i < csvDataRows.length; i++) {
                const row = csvDataRows[i];
                if (!row || row.length === 0) continue;
                let curCode = String(row[colMap.code] || "").trim();
                if (!curCode) continue;

                let curName = colMap.name !== undefined ? String(row[colMap.name] || "").trim() : "";
                let dateStr = colMap.date !== undefined ? String(row[colMap.date] || "").trim() : "";
                let desc = String(row[5] || "").trim(); 
                let debit = cleanNumber(row[colMap.debit]);
                let credit = cleanNumber(row[colMap.credit]);

                const rowString = row.join("|");
                const rowStrLower = rowString.toLowerCase();
                
                if (closingKeywords.some(kw => rowStrLower.includes(kw))) continue; 

                let isOpening = rowString.includes("ยอดยกมา");

                if (isOpening || (!dateStr && isOpening)) {
                    if (!seenAccountsSmart.has(curCode)) {
                        seenAccountsSmart.add(curCode);
                        flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: desc || 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: debit, rawCredit: credit });
                    }
                } else if (dateStr && dateStr.includes('/')) {
                    const { year, month } = parseDateToYearMonth(dateStr);
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: dateStr, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: debit, rawCredit: credit });
                }
            }
        } else {
            let curCode = "";
            let curName = "";
            let seenAccountsStandard = new Set();

            csvDataRows.forEach(row => {
                if (!row || row.length === 0) return;
                const col0 = (row[0] || "").toString().trim();
                
                const accountMatch = col0.match(/^(\d+)\s*\((.*)\)/);
                if (accountMatch) { curCode = accountMatch[1]; curName = accountMatch[2]; }
                if (!curCode) return;
                
                const rowString = row.join("|");
                const rowStrLower = rowString.toLowerCase();
                const desc = String(row[5] || "").trim();
                
                if (closingKeywords.some(kw => rowStrLower.includes(kw)) || rowString.includes("ลำดับที่")) return;

                const debit = cleanNumber(row[6]);
                const credit = cleanNumber(row[7]);

                if (rowString.includes("ยอดยกมา")) {
                    if (!seenAccountsStandard.has(curCode)) {
                        seenAccountsStandard.add(curCode);
                        flatTransactions.push({ id: generateId(), date: 'ยอดยกมา', code: curCode, name: curName, desc: desc || 'ยอดยกมา', year: -1, month: -1, isOpening: true, rawDebit: debit, rawCredit: credit });
                    }
                } else {
                    const dateStr = String(row[2]||"").trim();
                    if (!dateStr || !dateStr.includes('/')) return; 

                    const { year, month } = parseDateToYearMonth(dateStr);
                    if (year !== -1) yearsSet.add(year);
                    flatTransactions.push({ id: generateId(), date: dateStr, code: curCode, name: curName, desc: desc, year, month, isOpening: false, rawDebit: debit, rawCredit: credit });
                }
            });
        }

        setParsedTx(flatTransactions);
        setAvailableYears(Array.from(yearsSet).sort((a,b)=>b-a));
    }, [csvDataRows]);

    useEffect(() => {
        if (!parsedTx || parsedTx.length === 0) return;
        
        const targetYear = selectedYear || (availableYears.length > 0 ? availableYears[0] : new Date().getFullYear());
        const accountMap = {};
        
        parsedTx.forEach(tx => {
            const code = String(tx.code || '').trim();
            if (!code) return;
            
            if (!accountMap[code]) {
                accountMap[code] = { id: code, name: tx.name, openingBalance: 0, monthlyChange: Array(12).fill(0) };
            }
            
            let isDebitNature = code.startsWith('1') || code.startsWith('5');
            let debit = parseFloat(tx.rawDebit) || 0;
            let credit = parseFloat(tx.rawCredit) || 0;
            let netAmt = isDebitNature ? (debit - credit) : (credit - debit);

            if (tx.isOpening) {
                accountMap[code].openingBalance += netAmt;
            } else {
                const isBS = code.startsWith('1') || code.startsWith('2') || code.startsWith('3');
                if (tx.year < targetYear && isBS) {
                    accountMap[code].openingBalance += netAmt;
                } else if (tx.year === targetYear && tx.month >= 0 && tx.month < 12) {
                    accountMap[code].monthlyChange[tx.month] += netAmt;
                }
            }
        });

        const categories = { revenue: [], cogs: [], opex: [], assets_current: [], liabilities_current: [], equity: [] };
        Object.values(accountMap).forEach(acc => {
            const code = acc.id;
            const isBS = code.startsWith('1') || code.startsWith('2') || code.startsWith('3');
            let currentBalance = acc.openingBalance;
            const processedMonthly = acc.monthlyChange.map(change => {
                if (isBS) { currentBalance += change; return currentBalance; }
                return change;
            });
            const finalAcc = { ...acc, monthly: processedMonthly };
            
            if (code.startsWith('4')) categories.revenue.push(finalAcc);
            else if (code.startsWith('51')) categories.cogs.push(finalAcc);
            else if (code.startsWith('5')) categories.opex.push(finalAcc);
            else if (code.startsWith('1')) categories.assets_current.push(finalAcc);
            else if (code.startsWith('2')) categories.liabilities_current.push(finalAcc);
            else if (code.startsWith('3')) categories.equity.push(finalAcc);
        });
        setFinancialData(categories);
    }, [parsedTx, selectedYear, availableYears]);

    const reportData = useMemo(() => {
        const sumM = (arr) => {
            const res = Array(12).fill(0);
            if (!arr || arr.length === 0) return res;
            arr.forEach(item => { if (item.monthly) item.monthly.forEach((v, i) => { if (i < 12) res[i] += v; }); });
            return res;
        };
        const totalRev = sumM(financialData.revenue);
        const totalCogs = sumM(financialData.cogs);
        const totalOpex = sumM(financialData.opex);
        const totalCombinedExp = totalCogs.map((c, i) => c + totalOpex[i]);
        const grossProfit = totalRev.map((r, i) => r - totalCogs[i]);
        const netIncomeMonthly = grossProfit.map((g, i) => g - totalOpex[i]);
        let runningNetProfit = 0;
        const netIncomeCumulative = netIncomeMonthly.map(val => {
            runningNetProfit += val;
            return runningNetProfit;
        });
        const totalAssets = sumM(financialData.assets_current);
        const totalLiabilities = sumM(financialData.liabilities_current);
        const totalEquityLedger = sumM(financialData.equity);
        const totalEquityReal = totalEquityLedger.map((e, i) => e + netIncomeCumulative[i]);
        const totalLiabEquity = totalLiabilities.map((l, i) => l + totalEquityReal[i]);
        const yearlyRev = totalRev.reduce((a, b) => a + b, 0);
        const yearlyNet = netIncomeMonthly.reduce((a, b) => a + b, 0);
        const netMargin = yearlyRev ? (yearlyNet / yearlyRev) * 100 : 0;
        
        let tbAccounts = [];
        const processTB = (arr) => {
            arr.forEach(acc => {
                const isBS = acc.id.startsWith('1') || acc.id.startsWith('2') || acc.id.startsWith('3');
                const isDebitNature = acc.id.startsWith('1') || acc.id.startsWith('5');
                const balance = isBS ? (acc.monthly[11] || 0) : acc.monthly.reduce((a,b)=>a+b,0);
                
                if (Math.abs(balance) > 0.01) {
                    let dr = 0, cr = 0;
                    if (isDebitNature) {
                        if (balance > 0) dr = balance; else cr = Math.abs(balance);
                    } else {
                        if (balance > 0) cr = balance; else dr = Math.abs(balance);
                    }
                    tbAccounts.push({ id: acc.id, name: acc.name, dr, cr });
                }
            });
        }
        processTB([...financialData.assets_current, ...financialData.liabilities_current, ...financialData.equity, ...financialData.revenue, ...financialData.cogs, ...financialData.opex]);
        tbAccounts.sort((a,b) => a.id.localeCompare(b.id));

        return {
            totalRev, totalCogs, totalOpex, totalCombinedExp, grossProfit,
            netIncomeMonthly, netIncomeCumulative,
            totalAssets, totalLiabilities, totalEquityLedger, totalEquityReal, totalLiabEquity,
        yearlyRev, yearlyNet, netMargin, tbAccounts
    };
}, [financialData]);

const updateTransaction = (id, newFields) => {
    setParsedTx(prev => prev.map(t => t.id === id ? { ...t, ...newFields } : t));
};
const deleteTransaction = (id) => {
    setParsedTx(prev => prev.filter(t => t.id !== id));
};

return { financialData, reportData, availableYears, parsedTx, updateTransaction, deleteTransaction };
};

const StatementTotalRow = ({ label, values, viewType, isGrandTotal = false }) => {

const total = isBS ? (data[11] || 0) : data.reduce((a, b) => a + b, 0);
const bgClass = isGrandTotal ? 'bg-blue-950 text-white' : 'bg-blue-50 text-blue-900';

return (
<tr className={`${bgClass} ${borderClass}`}>

{formatCurrency(total)}

// --- Main Application ---
const App = () => {
const [activeTab, setActiveTab] = useState('import');
const [statementView, setStatementView] = useState('tb'); 
const [isImporting, setIsImporting] = useState(false);
const [rawCsvData, setRawCsvData] = useState(null);
const [fileName, setFileName] = useState("");
const [selectedYear, setSelectedYear] = useState("");
const [searchVerify, setSearchVerify] = useState("");

// --- New States for Intelligence Feature ---
const [query, setQuery] = useState("");
const [customChart, setCustomChart] = useState(null);

const [editId, setEditId] = useState(null);
const [editForm, setEditForm] = useState({});

const [isSendingLine, setIsSendingLine] = useState(false);
const [showNotification, setShowNotification] = useState(false);

const getExcelWorkbook = () => {
const wb = XLSX.utils.book_new();
const styles = {
header: { fill: { fgColor: { rgb: "172554" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 }, alignment: { horizontal: "center", vertical: "center" } },
month: { fill: { fgColor: { rgb: "1E3A8A" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 10 }, alignment: { horizontal: "center", vertical: "center" }, border: { left: { style: "thin", color: { rgb: "DBEAFE" } } } },
year: { fill: { fgColor: { rgb: "1D4ED8" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 11 }, alignment: { horizontal: "center", vertical: "center" } },
group: { fill: { fgColor: { rgb: "EFF6FF" } }, font: { bold: true, color: { rgb: "1E3A8A" } } },
total: { fill: { fgColor: { rgb: "DBEAFE" } }, font: { bold: true, color: { rgb: "1E3A8A" } }, border: { top: { style: "thin", color: { rgb: "93C5FD" } }, bottom: { style: "thin", color: { rgb: "93C5FD" } } } },
grand: { fill: { fgColor: { rgb: "172554" } }, font: { bold: true, color: { rgb: "FFFFFF" } } },
currency: { alignment: { horizontal: "right" }, numFmt: "#,##0.00;[Red](#,##0.00)", font: { sz: 10 } }
};

const buildSheet = (sheetName, sections, viewType) => {
const data = [["Account Code", "Description", ...MONTHS_SHORT, viewType === 'pnl' ? "Year Total" : "Ending Balance"]];
sections.forEach(sec => {
data.push([sec.title.toUpperCase()]);
sec.items.forEach(it => {
const t = viewType === 'pnl' ? (it.monthly?.reduce((a,b)=>a+b,0)||0) : (it.monthly?.[11]||0);
data.push([it.id, it.name, ...(it.monthly || Array(12).fill(0)), t]);
});
if (sec.totalRow) data.push([sec.totalLabel, "", ...(sec.totalValues || Array(12).fill(0)), (sec.grandTotal || 0)]);
data.push([]);
});
const ws = XLSX.utils.aoa_to_sheet(data);
const range = XLSX.utils.decode_range(ws['!ref']);
for (let R = range.s.r; R <= range.e.r; ++R) {
for (let C = range.s.c; C <= range.e.c; ++C) {
const ref = XLSX.utils.encode_cell({ c: C, r: R });
if (!ws[ref]) continue;
if (R === 0) {
if (C < 2) ws[ref].s = styles.header;
else if (C < 14) ws[ref].s = styles.month;
else ws[ref].s = styles.year;
} else {
if (C >= 2) ws[ref].s = styles.currency;
const v0 = ws[XLSX.utils.encode_cell({c:0, r:R})]?.v?.toString() || "";
const v1 = ws[XLSX.utils.encode_cell({c:1, r:R})]?.v;
if (v0 && !v1 && R > 0) ws[ref].s = styles.group;
if (v0.includes("TOTAL") || v0.includes("NET")) ws[ref].s = { ...ws[ref].s, ...styles.total };
if (v0 === "TOTAL LIAB & EQUITY" || v0 === "NET INCOME" || v0 === "TOTAL ASSETS") ws[ref].s = { ...ws[ref].s, ...styles.grand };
}
}
}
ws['!cols'] = [{wch:12}, {wch:40}, ...Array(13).fill({wch:14})];
XLSX.utils.book_append_sheet(wb, ws, sheetName);
};

buildSheet("Profit and Loss", [
{ title: "Revenue", items: financialData.revenue, totalRow: true, totalLabel: "TOTAL REVENUE", totalValues: reportData.totalRev, grandTotal: reportData.yearlyRev },
{ title: "Cost & Expenses", items: [...financialData.cogs, ...financialData.opex], totalRow: true, totalLabel: "TOTAL EXPENSES", totalValues: reportData.totalCombinedExp, grandTotal: reportData.totalCombinedExp.reduce((a,b)=>a+b,0) },
{ title: "Summary", items: [], totalRow: true, totalLabel: "NET INCOME", totalValues: reportData.netIncomeMonthly, grandTotal: reportData.yearlyNet }
], 'pnl');

buildSheet("Balance Sheet", [
{ title: "Assets", items: financialData.assets_current, totalRow: true, totalLabel: "TOTAL ASSETS", totalValues: reportData.totalAssets, grandTotal: reportData.totalAssets[11] },
{ title: "Liabilities", items: financialData.liabilities_current, totalRow: true, totalLabel: "TOTAL LIABILITIES", totalValues: reportData.totalLiabilities, grandTotal: reportData.totalLiabilities[11] },
{ title: "Equity", items: [...financialData.equity, { id: '', name: 'Net Profit (Current Period)', monthly: reportData.netIncomeCumulative }], totalRow: true, totalLabel: "TOTAL EQUITY", totalValues: reportData.totalEquityReal, grandTotal: reportData.totalEquityReal[11] },
{ title: "Verification", items: [], totalRow: true, totalLabel: "TOTAL LIAB & EQUITY", totalValues: reportData.totalLiabEquity, grandTotal: reportData.totalLiabEquity[11] }
], 'bs');

const tbData = [["Account Code", "Account Name", "Debit Balance", "Credit Balance"]];
reportData.tbAccounts.forEach(acc => tbData.push([acc.id, acc.name, acc.dr, acc.cr]));
tbData.push(["TOTAL", "", reportData.tbAccounts.reduce((a,b)=>a+b.dr,0), reportData.tbAccounts.reduce((a,b)=>a+b.cr,0)]);
const wsTb = XLSX.utils.aoa_to_sheet(tbData);
wsTb['!cols'] = [{wch:15}, {wch:40}, {wch:20}, {wch:20}];
XLSX.utils.book_append_sheet(wb, wsTb, "Trial Balance");

return wb;
};

const message = `
📊 สรุปงบการเงิน (FinPulse)
🏢 บริษัท: Amper Co., Ltd.
📅 ปีบัญชี: ${selectedYear || 'FY 2025'}
-----------------------
💰 รายได้รวม: ${formatCompact(reportData.yearlyRev)}
📉 ค่าใช้จ่ายรวม: ${formatCompact(reportData.totalCombinedExp.reduce((a,b)=>a+b,0))}
💵 กำไร(ขาดทุน)สุทธิ: ${formatCompact(reportData.yearlyNet)}
📈 อัตรากำไรสุทธิ: ${reportData.netMargin.toFixed(2)}%
-----------------------
🏦 สินทรัพย์รวม: ${formatCompact(reportData.totalAssets[11] || 0)}

💼 ส่วนของผู้ถือหุ้น: ${formatCompact(reportData.totalEquityReal[11] || 0)}
`;

try {
const wb = getExcelWorkbook();
const fileBase64 = XLSX.write(wb, { type: 'base64', bookType: 'xlsx' });
const payload = { message: message, fileName: `Financial_Report_${selectedYear}.xlsx`, fileBase64: fileBase64 };
const response = await fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
const result = await response.json();
if (result.status === 'success') {
setNotificationMsg("✅ ส่งคำสั่งเข้า LINE เรียบร้อยแล้ว!");
} else { throw new Error(result.message || 'ส่งไม่สำเร็จ'); }
} catch (error) {
setNotificationError(true);
setNotificationMsg(`❌ ส่งไม่สำเร็จ: ${error.message}`);
} finally {
setIsSendingLine(false);
setShowNotification(true);
setTimeout(() => setShowNotification(false), 5000);
}
};

const handleFileUpload = (e) => {
const file = e.target.files[0];
if (!file) return;
setFileName(file.name);
setIsImporting(true);
const reader = new FileReader();

reader.onload = (evt) => {
    try {
        let data = [];
        const arrayBuffer = evt.target.result;
        
        if (file.name.toLowerCase().endsWith('.csv')) {
            const decoder = new TextDecoder('windows-874'); 
            const csvText = decoder.decode(arrayBuffer);
            const wb = XLSX.read(csvText, { type: 'string' });
            const wsname = wb.SheetNames[0];
            data = XLSX.utils.sheet_to_json(wb.Sheets[wsname], { header: 1 });
        } else {
            const wb = XLSX.read(arrayBuffer, { type: 'array' });
            const wsname = wb.SheetNames[0];
            data = XLSX.utils.sheet_to_json(wb.Sheets[wsname], { header: 1 });
        }
        
        setRawCsvData(data);
        
        if (data.length <= 1) {
            throw new Error("ไฟล์ว่างเปล่า หรือรูปแบบไฟล์ผิดปกติ");
        }

        setTimeout(() => {
            setIsImporting(false);
            setActiveTab('verify'); 
            setStatementView('tb');
        }, 500);
    } catch (err) {
        console.error(err);
        setIsImporting(false);
        setNotificationError(true);
        setNotificationMsg("❌ ไม่สามารถอ่านไฟล์ได้ กรุณาตรวจสอบว่าเป็นไฟล์ GL หรือเข้ารหัสถูกต้องหรือไม่");
        setShowNotification(true);
        setTimeout(() => setShowNotification(false), 5000);
    }
};

reader.readAsArrayBuffer(file);
};

                                    <input className="w-full border border-blue-300 rounded px-2 py-1 text-sm focus:ring-1 focus:ring-blue-500" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} />
                                </td>
                                <td className="px-6 py-2 text-slate-500 text-xs truncate max-w-[200px]" title={tx.desc}>{tx.desc}</td>
                                <td className="px-6 py-2">
                                    <input type="number" className="w-full border border-emerald-300 rounded px-2 py-1 text-right font-mono text-sm focus:ring-1 focus:ring-emerald-500" value={editForm.rawDebit} onChange={e => setEditForm({...editForm, rawDebit: e.target.value})} />
                                </td>
                                <td className="px-6 py-2">
                                    <input type="number" className="w-full border border-rose-300 rounded px-2 py-1 text-right font-mono text-sm focus:ring-1 focus:ring-rose-500" value={editForm.rawCredit} onChange={e => setEditForm({...editForm, rawCredit: e.target.value})} />
                                </td>
                                <td className="px-6 py-2 text-center flex justify-center gap-3">
                                    <button onClick={saveEdit} className="text-emerald-600 hover:text-emerald-800 bg-white p-1.5 rounded-full shadow-sm" title="บันทึก"><Icon name="Check" /></button>
                                    <button onClick={() => setEditId(null)} className="text-slate-400 hover:text-rose-600 bg-white p-1.5 rounded-full shadow-sm" title="ยกเลิก"><Icon name="Xmark" /></button>
                                </td>
                            </tr>
                        ) : (
                            <tr key={tx.id} className={`hover:bg-blue-50/50 border-b border-slate-100 group ${tx.date.includes('31/12') && tx.code.startsWith('4') ? 'bg-rose-50/30' : ''}`}>
                                <td className="px-6 py-3 font-mono text-slate-500 text-xs">{tx.date}</td>
                                <td className="px-6 py-3 font-mono font-bold text-blue-700">{tx.code}</td>
                                <td className="px-6 py-3 text-slate-700 truncate max-w-[150px]">{tx.name}</td>
                                <td className="px-6 py-3 text-slate-500 text-xs truncate max-w-[200px]" title={tx.desc}>{tx.desc || '-'}</td>
                                <td className="px-6 py-3 text-right font-mono text-emerald-600">{tx.rawDebit ? formatCurrency(tx.rawDebit) : '-'}</td>
                                <td className="px-6 py-3 text-right font-mono text-rose-600">{tx.rawCredit ? formatCurrency(tx.rawCredit) : '-'}</td>
                                <td className="px-6 py-3 text-center opacity-0 group-hover:opacity-100 transition-opacity flex justify-center gap-3">
                                    <button onClick={() => startEdit(tx)} className="text-blue-500 hover:text-blue-800" title="แก้ไขรายการ"><Icon name="Pen" /></button>
                                    <button onClick={() => { if(window.confirm('ยืนยันการลบรายการนี้ใช่หรือไม่? (การลบจะทำให้ตัวเลขในงบเปลี่ยนไป)')) deleteTransaction(tx.id); }} className="text-slate-300 hover:text-rose-600" title="ลบรายการ"><Icon name="Trash" /></button>
                                </td>
                            </tr>
                        );
                    })}
                {parsedTx.length > 500 && (
                    <tr>
                        <td colSpan="7" className="px-6 py-4 text-center text-xs text-slate-400 font-medium bg-slate-50">
                            แสดงข้อมูล 500 รายการแรก กรุณาพิมพ์ค้นหาเพื่อดูรายการอื่นเพิ่มเติม
                        </td>
                    </tr>
                )}
            </tbody>
        </table>
    </div>
</div>
)}

{activeTab === 'dashboard' && importSuccess && (

{/* --- NEW: Intelligence Command --- */}

    <div className="relative z-10 flex flex-col md:flex-row items-center gap-6">

        <div className="flex-1 w-full">

        </div>
    </div>
</div>

{/* --- NEW: Dynamic Custom Chart --- */}
{customChart && (
    <div className="bg-white p-8 rounded-2xl shadow-lg border-2 border-blue-500 mb-8 animate-fade-in">

        <div className="h-72">

                    <BarChart data={customChart.data}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                        <XAxis dataKey="name" /> <YAxis tickFormatter={formatCompact} /> <Tooltip formatter={(v) => `฿${v.toLocaleString()}`} /> <Legend />
                        {customChart.keys.map(k => <Bar key={k.k} dataKey={k.k} name={k.k} fill={k.c} radius={[4, 4, 0, 0]} />)}
                    </BarChart>
                ) : (
                    <AreaChart data={customChart.data}>
                        <defs><linearGradient id="col" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.4}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient></defs>
                        <XAxis dataKey="name" /> <YAxis tickFormatter={formatCompact} /> <Tooltip formatter={(v) => `฿${v.toLocaleString()}`} />
                        <Area type="monotone" dataKey="Value" name="Cumulative Profit" stroke="#10b981" fill="url(#col)" strokeWidth={3} />
                    </AreaChart>
                )}
            </ResponsiveContainer>
        </div>
    </div>
)}

<div className="grid grid-cols-1 md:grid-cols-4 gap-6">
<KPICard title="Revenue YTD" value={formatCompact(reportData.yearlyRev)} iconName="TrendingUp" trend="up" trendValue="12.5%" />
<KPICard title="Expenses YTD" value={formatCompact(reportData.totalCombinedExp.reduce((a,b)=>a+b,0))} iconName="TrendingDown" />
<KPICard title="Net Income" value={formatCompact(reportData.yearlyNet)} iconName="DollarSign" trend="up" trendValue="8.4%" />
<KPICard title="Net Margin" value={`${reportData.netMargin.toFixed(1)}%`} iconName="PieChartIcon" />
</div>

<div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div className="lg:col-span-2 bg-white p-8 rounded-2xl border border-blue-100 shadow-sm">

        <div className="chart-container h-80 max-h-[400px]">
            <ResponsiveContainer width="100%" height="100%">
                <ComposedChart data={chartData} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />

                    <Tooltip contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)', fontSize: '13px', fontWeight: 'bold', color: '#1e3a8a'}} formatter={(v) => `฿${v.toLocaleString()}`} />
                    <Bar dataKey="Revenue" fill="#1e3a8a" radius={[6, 6, 6, 6]} maxBarSize={30} />
                    <Bar dataKey="Expenses" fill="#60a5fa" radius={[6, 6, 6, 6]} maxBarSize={30} />

    <div className="bg-white p-8 rounded-2xl border border-blue-100 shadow-sm flex flex-col">

                </PieChart>
            </ResponsiveContainer>
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none flex-col">
                <span className="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Total</span>
                <span className="text-lg font-black text-blue-950">{formatCompact(reportData.totalOpex.reduce((a,b)=>a+b,0))}</span>
            </div>
        </div>
    </div>
</div>

{/* --- NEW: Radar Chart & Auto Insight --- */}

        <p className="font-bold text-blue-950 mb-4 text-base">Financial Health Radar</p>

            <ResponsiveContainer width="100%" height="100%">
                <RadarChart cx="50%" cy="50%" outerRadius="75%" data={healthData}>
                    <PolarGrid stroke="#e2e8f0" />

                    <Tooltip />
                </RadarChart>
            </ResponsiveContainer>

    <div className="lg:col-span-2 bg-white p-8 rounded-2xl border border-blue-100 shadow-sm flex flex-col justify-center">

                <Icon name="CheckCircle2" className="text-emerald-500 mt-1" size={20} />

                    <p className="text-sm text-slate-600 mt-1">

                    </p>
                </div>
            </div>
            <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 flex gap-4">
                <Icon name="ScaleBalanced" className="text-blue-500 mt-1" size={20} />
                <div>
                    <h4 className="font-bold text-blue-900">สภาพคล่อง (Assets vs Liabilities)</h4>
                    <p className="text-sm text-slate-600 mt-1">
                        สินทรัพย์รวมล่าสุด {formatCompact(reportData.totalAssets[11])} เทียบกับ หนี้สิน {formatCompact(reportData.totalLiabilities[11])} 
                        {reportData.totalAssets[11] > reportData.totalLiabilities[11] ? ' โครงสร้างทุนมีความมั่นคง หนี้สินไม่เกินตัว' : ' มีความเสี่ยงด้านหนี้สิน ควรบริหารจัดการสภาพคล่องอย่างใกล้ชิด'}
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</div>

<button onClick={() => setStatementView('tb')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${statementView === 'tb' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-blue-700'}`}>Trial Balance</button>
<button onClick={() => setStatementView('pnl')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${statementView === 'pnl' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-blue-700'}`}>Profit & Loss</button>
<button onClick={() => setStatementView('bs')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${statementView === 'bs' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-blue-700'}`}>Balance Sheet</button>
</div>
<div className="text-right">
<h2 className="text-2xl font-black text-blue-950 tracking-tight uppercase">
    {statementView === 'pnl' ? 'Income Statement' : statementView === 'bs' ? 'Balance Sheet' : 'Trial Balance'}
</h2>
<p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Amper Co., Ltd. &middot; FY {selectedYear || '2025'}</p>
</div>
</div>
<div className="overflow-x-auto w-full custom-scrollbar">

{statementView === 'tb' && (
<table className="w-full border-collapse text-left text-sm">
<thead>
<tr>

<th className="bg-blue-950 px-6 py-5 border-b border-blue-900 border-r border-blue-900"><span className="text-xs font-bold text-white uppercase tracking-widest">Account Name</span></th>
<th className="bg-blue-900 px-6 py-5 border-b border-blue-800 text-right w-48"><span className="text-xs font-bold text-blue-100 uppercase tracking-widest">Debit</span></th>
<th className="bg-blue-900 px-6 py-5 border-b border-blue-800 text-right w-48"><span className="text-xs font-bold text-blue-100 uppercase tracking-widest">Credit</span></th>
</tr>
</thead>
<tbody>
{reportData.tbAccounts.map((acc, i) => (
<tr key={i} className="hover:bg-blue-50/50 border-b border-slate-100 transition-colors">
<td className="px-6 py-3 font-mono text-slate-500 border-r border-slate-100">{acc.id}</td>
<td className="px-6 py-3 font-semibold text-slate-800 border-r border-slate-100">{acc.name}</td>
<td className="px-6 py-3 text-right font-mono text-slate-700">{acc.dr > 0 ? formatCurrency(acc.dr) : '-'}</td>
<td className="px-6 py-3 text-right font-mono text-slate-700">{acc.cr > 0 ? formatCurrency(acc.cr) : '-'}</td>
</tr>
))}
<tr className="bg-blue-50 border-y border-blue-100">
<td colSpan="2" className="px-6 py-4 text-right font-bold text-blue-900 border-r border-blue-100 uppercase">Total</td>
<td className="px-6 py-4 text-right font-black font-mono text-blue-950 text-[15px]">{formatCurrency(reportData.tbAccounts.reduce((a,b)=>a+b.dr,0))}</td>
<td className="px-6 py-4 text-right font-black font-mono text-blue-950 text-[15px]">{formatCurrency(reportData.tbAccounts.reduce((a,b)=>a+b.cr,0))}</td>
</tr>
</tbody>
</table>
)}

{statementView !== 'tb' && (

<tr>

</th>
))}
<th className="px-6 py-5 text-xs font-bold text-white uppercase tracking-widest text-right border-b border-l border-blue-900 bg-blue-950">
{statementView === 'pnl' ? 'YTD Total' : 'Balance'}
</th>
</tr>
</thead>
<tbody>
{statementView === 'pnl' ? (
<>

<StatementTotalRow label="Total Revenue" values={reportData.totalRev} viewType={statementView} />

{[...financialData.cogs, ...financialData.opex].map((item, i) => <StatementRow key={i} item={item} isSub viewType={statementView} />)}

<StatementTotalRow label="Total Assets" values={reportData.totalAssets} viewType={statementView} isGrandTotal />
<tr><td colSpan="14" className="px-6 py-4 text-[11px] font-bold text-rose-600 uppercase tracking-widest bg-rose-50/50 pt-8">Liabilities</td></tr>
{financialData.liabilities_current.map((item, i) => <StatementRow key={i} item={item} isSub viewType={statementView} />)}
<StatementTotalRow label="Total Liabilities" values={reportData.totalLiabilities} viewType={statementView} />
<tr><td colSpan="14" className="px-6 py-4 text-[11px] font-bold text-indigo-600 uppercase tracking-widest bg-indigo-50/50 pt-8">Equity</td></tr>
{financialData.equity.map((item, i) => <StatementRow key={i} item={item} isSub viewType={statementView} />)}
<StatementRow item={{ name: 'Retained Earnings (Current YTD)', monthly: reportData.netIncomeCumulative }} isProfitRow viewType={statementView} />
<StatementTotalRow label="Total Equity" values={reportData.totalEquityReal} viewType={statementView} />
<tr className="h-4"><td colSpan="14" className="bg-white"></td></tr>
<StatementTotalRow label="Total Liab. & Equity" values={reportData.totalLiabEquity} viewType={statementView} isGrandTotal />
</>
)}
</tbody>
</table>
)}
</div>
</div>
)}

{activeTab !== 'import' && !importSuccess && (
<div className="h-[50vh] flex flex-col items-center justify-center text-center">
<div className="w-20 h-20 bg-white shadow-sm border border-blue-100 rounded-2xl flex items-center justify-center mb-6">
<Icon name="FileText" size={32} className="text-blue-500" />
</div>
<h2 className="text-xl font-bold text-blue-950 mb-2">No Financial Data Loaded</h2>
<p className="text-sm text-slate-500 mb-8 max-w-sm">Please import a General Ledger file from the integration hub to generate insights.</p>
<button onClick={() => setActiveTab('import')} className="bg-blue-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg shadow-blue-700/30 hover:bg-blue-800 transition-colors">
Go to Import
</button>
</div>
)}
</div>
</main>
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
