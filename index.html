<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinPulse - Financial Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.1.9/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #f4f7fb; }
    .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    @media print { .no-print { display: none !important; } }
    .chart-container { position: relative; width: 100%; height: 100%; }
</style>
</head>
<body class="text-slate-800">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, BarChart, Bar, PieChart, Pie, Cell, ComposedChart } = window.Recharts;

// --- Icon Component ---
const Icon = ({ name, size = 16, className = "" }) => {
    const faMap = {
        Upload: 'fa-solid fa-upload', FileText: 'fa-solid fa-file-lines', BarChart3: 'fa-solid fa-chart-column',
        TrendingUp: 'fa-solid fa-arrow-trend-up', TrendingDown: 'fa-solid fa-arrow-trend-down',
        Loader2: 'fa-solid fa-circle-notch fa-spin', Printer: 'fa-solid fa-print', Layers: 'fa-solid fa-layer-group',
        CheckCircle2: 'fa-solid fa-circle-check', PieChartIcon: 'fa-solid fa-chart-pie', DollarSign: 'fa-solid fa-dollar-sign',
        ListCheck: 'fa-solid fa-list-check', Pen: 'fa-solid fa-pen', Trash: 'fa-solid fa-trash'
    };
    return <i className={`${faMap[name] || 'fa-solid fa-circle'} ${className}`} style={{ fontSize: size }}></i>;
};

const MONTHS_SHORT = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
const COLORS = ['#1e3a8a', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd'];

// --- Formatting Utils ---
const formatCurrency = (val) => {
    if (!val || isNaN(val)) return '-';
    if (Math.abs(val) < 0.01) return '-';
    return Math.abs(val).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};

const formatCompact = (val) => {
    if (!val || isNaN(val)) return '0';
    if (Math.abs(val) >= 1000000) return `฿ ${(val / 1000000).toFixed(2)}M`;
    if (Math.abs(val) >= 1000) return `฿ ${(val / 1000).toFixed(2)}k`;
    return `฿ ${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
};

// --- Mock Data Engine (แทนที่ด้วยระบบ Import จริงของคุณได้) ---
const useFinancialEngine = () => {
    // ใส่ Mock Data เพื่อให้แสดงผลเหมือนในภาพ
    const reportData = {
        yearlyRev: 5590000,
        totalCombinedExp: [1190000],
        yearlyNet: 4400000,
        netMargin: 78.7,
        totalRev: [1400000, 1420000, 1350000, 1550000, 0, 0, 0, 0, 0, 0, 0, 0],
        totalExp: [450000, 430000, 300000, 10000, 0, 0, 0, 0, 0, 0, 0, 0],
        netIncomeMonthly: [950000, 990000, 1050000, 1540000, 0, 0, 0, 0, 0, 0, 0, 0]
    };
    
    const expensePieData = [
        { name: 'Cost of Sales', value: 650000 },
        { name: 'Marketing', value: 250000 },
        { name: 'Payroll', value: 150000 },
        { name: 'Rent', value: 100000 },
        { name: 'Utilities', value: 40000 }
    ];

    return { importSuccess: true, reportData, expensePieData };
};

// --- Custom UI Components ---
const KPICard = ({ title, value, iconName, trend, trendValue, iconColorClass, iconBgClass }) => (
    <div className="bg-white rounded-xl p-6 border-l-4 border-[#1e3a8a] shadow-sm flex flex-col justify-between h-36">
        <div className="flex justify-between items-start">
            <div className={`${iconBgClass} ${iconColorClass} p-2 rounded-lg flex items-center justify-center w-10 h-10`}>
                <Icon name={iconName} size={18} />
            </div>
            {trend && (
                <span className={`flex items-center gap-1 text-[11px] font-bold px-2 py-1 rounded-md ${trend === 'up' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                    {trend === 'up' ? <Icon name="TrendingUp" size={10} /> : <Icon name="TrendingDown" size={10} />}
                    {trendValue}
                </span>
            )}
        </div>
        <div className="mt-4">
            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">{title}</p>
            <h3 className="text-3xl font-black text-[#0f172a] tracking-tight">{value}</h3>
        </div>
    </div>
);

// --- Main Application ---
const App = () => {
    const [activeTab, setActiveTab] = useState('dashboard');
    const { importSuccess, reportData, expensePieData } = useFinancialEngine();
    
    const chartData = useMemo(() => {
        return MONTHS_SHORT.map((m, i) => ({
            name: m,
            Revenue: reportData.totalRev[i],
            Expenses: reportData.totalExp[i],
            Profit: reportData.netIncomeMonthly[i],
        }));
    }, [reportData]);

    return (
        <div className="flex h-screen overflow-hidden bg-[#f4f7fb]">
            {/* --- Sidebar --- */}
            <aside className="w-64 bg-[#1e2235] flex flex-col z-50 shadow-xl no-print shrink-0">
                <div className="h-20 flex items-center px-6 border-b border-slate-700/50">
                    <div className="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white mr-3">
                        <Icon name="Layers" size={16} />
                    </div>
                    <h1 className="text-xl font-bold tracking-tight text-white">Fin<span className="text-blue-400">Pulse</span></h1>
                </div>
                
                <div className="flex-1 py-6 px-4 flex flex-col gap-2">
                    <p className="px-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Finance Engine</p>
                    {[
                        { id: 'import', iconName: 'Upload', label: 'Data Import' },
                        { id: 'verify', iconName: 'ListCheck', label: 'Data Re-check' },
                        { id: 'dashboard', iconName: 'BarChart3', label: 'Performance Analytics' },
                        { id: 'statements', iconName: 'FileText', label: 'Ledger Statements' },
                    ].map(item => (
                        <button
                            key={item.id}
                            onClick={() => setActiveTab(item.id)}
                            className={`flex items-center gap-3 px-4 py-3 rounded-lg transition-all text-sm font-semibold ${
                                activeTab === item.id
                                ? 'bg-[#2563eb] text-white shadow-md'
                                : 'text-slate-400 hover:bg-slate-800 hover:text-white'
                            }`}
                        >
                            <Icon name={item.iconName} size={16} className={activeTab === item.id ? 'text-white' : 'text-slate-400'} />
                            <span>{item.label}</span>
                        </button>
                    ))}
                </div>
                
                {/* User Profile Area (Bottom) */}
                <div className="p-6 border-t border-slate-700/50">
                    <div className="flex items-center gap-3">
                        <div className="w-9 h-9 bg-blue-800 rounded-full flex items-center justify-center text-xs font-bold text-white">AM</div>
                        <div>
                            <p className="text-sm font-bold text-white">Amper Co., Ltd.</p>
                            <p className="text-xs text-slate-400">Active Workspace</p>
                        </div>
                    </div>
                </div>
            </aside>

            {/* --- Main Content --- */}
            <main className="flex-1 flex flex-col h-full overflow-hidden">
                {/* Header */}
                <header className="h-20 flex items-center justify-between px-8 bg-[#f4f7fb] no-print shrink-0">
                    <div className="flex items-center gap-4">
                        <h2 className="font-bold text-xl text-[#0f172a] tracking-tight">Financial Overview</h2>
                        <div className="flex items-center bg-blue-50 border border-blue-100 rounded-full overflow-hidden h-8">
                            <span className="px-3 py-1 text-xs font-bold text-blue-600 bg-blue-100/50 border-r border-blue-100">FY</span>
                            <select className="bg-transparent text-blue-700 px-3 py-1 text-sm font-bold focus:outline-none cursor-pointer">
                                <option>2026</option>
                            </select>
                        </div>
                    </div>
                    
                    <div className="flex items-center gap-3">
                        <span className="flex items-center gap-1.5 px-3 py-2 text-emerald-600 bg-emerald-50 border border-emerald-100 rounded-lg text-xs font-bold">
                            <Icon name="CheckCircle2" size={14} /> Data Synced
                        </span>
                        <button onClick={() => window.print()} className="p-2 text-slate-500 hover:text-[#0f172a] hover:bg-white transition-colors border border-slate-200 rounded-lg bg-white shadow-sm flex items-center justify-center w-9 h-9" title="Print">
                            <Icon name="Printer" size={14} />
                        </button>
                        {/* 🚫 ซ่อนปุ่ม Line และ Export ไว้ตามคำสั่ง */}
                        {/* <button className="bg-[#00B900] text-white px-4 py-2 rounded-lg text-sm font-bold... ">...</button> */}
                        {/* <button className="bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold... ">...</button> */}
                    </div>
                </header>

                {/* Content Scrollable Area */}
                <div className="flex-1 overflow-y-auto p-8 pt-2 custom-scrollbar">
                    {activeTab === 'dashboard' && importSuccess && (
                        <div className="max-w-7xl mx-auto space-y-6">
                            
                            {/* KPI Cards Row */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                <KPICard 
                                    title="REVENUE YTD" value={formatCompact(reportData.yearlyRev)} 
                                    iconName="TrendingUp" trend="up" trendValue="+ 12.5%" 
                                    iconBgClass="bg-blue-50" iconColorClass="text-blue-600"
                                />
                                <KPICard 
                                    title="EXPENSES YTD" value={formatCompact(reportData.totalCombinedExp[0])} 
                                    iconName="TrendingDown" 
                                    iconBgClass="bg-blue-50" iconColorClass="text-blue-600"
                                />
                                <KPICard 
                                    title="NET INCOME" value={formatCompact(reportData.yearlyNet)} 
                                    iconName="DollarSign" trend="up" trendValue="+ 8.4%" 
                                    iconBgClass="bg-blue-50" iconColorClass="text-blue-600"
                                />
                                <KPICard 
                                    title="NET MARGIN" value={`${reportData.netMargin}%`} 
                                    iconName="PieChartIcon" 
                                    iconBgClass="bg-blue-50" iconColorClass="text-blue-600"
                                />
                            </div>

                            {/* Charts Row */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Bar & Line Chart */}
                                <div className="lg:col-span-2 bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex flex-col h-[420px]">
                                    <p className="text-sm font-bold text-[#0f172a] mb-6">Income vs Expense Trend</p>
                                    <div className="flex-1 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={chartData} margin={{ top: 10, right: 0, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 11, fontWeight: 600}} dy={10} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#94a3b8', fontSize: 11, fontWeight: 600}} tickFormatter={(v) => v === 0 ? '0k' : `${(v/1000)}k`} />
                                                <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)', fontSize: '12px', fontWeight: 'bold'}} formatter={(v) => `฿${v.toLocaleString()}`} />
                                                <Bar dataKey="Revenue" fill="#1e3a8a" radius={[4, 4, 0, 0]} maxBarSize={28} />
                                                <Bar dataKey="Expenses" fill="#60a5fa" radius={[4, 4, 0, 0]} maxBarSize={28} />
                                                <Line type="monotone" dataKey="Profit" stroke="#eab308" strokeWidth={3} dot={{r: 4, fill: '#eab308', strokeWidth: 2, stroke: '#fff'}} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Donut Chart */}
                                <div className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex flex-col h-[420px]">
                                    <p className="text-sm font-bold text-[#0f172a] mb-2">Top Expenses</p>
                                    <div className="flex-1 relative w-full h-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={expensePieData} innerRadius="65%" outerRadius="85%" paddingAngle={2} dataKey="value" stroke="none">
                                                    {expensePieData.map((entry, index) => <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />)}
                                                </Pie>
                                                <Tooltip formatter={(v) => `฿${v.toLocaleString()}`} contentStyle={{fontSize: '12px', borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgba(0,0,0,0.1)', fontWeight: 'bold'}} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                        {/* Center Text */}
                                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none flex-col mt-2">
                                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">TOTAL</span>
                                            <span className="text-lg font-black text-[#0f172a]">{formatCompact(reportData.totalCombinedExp[0])}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                        </div>
                    )}
                </div>
            </main>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
